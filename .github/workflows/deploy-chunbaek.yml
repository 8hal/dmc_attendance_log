# 춘백 Firebase 배포 — GitHub Actions (모바일에서 Run workflow)
#
# 사전 준비: _docs/development/github-actions-firebase-deploy.md
# 시크릿: FIREBASE_SERVICE_ACCOUNT_DMC_ATTENDANCE (GCP 서비스 계정 JSON)

name: Deploy Chunbaek (Firebase)

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "배포 대상"
        required: true
        default: hosting
        type: choice
        options:
          - hosting
          - functions-chunbaek
          - hosting-and-chunbaek

concurrency:
  group: deploy-chunbaek-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: ${{ inputs.deploy_target }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Functions dependencies
        if: inputs.deploy_target != 'hosting'
        working-directory: functions
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DMC_ATTENDANCE }}

      - name: Deploy Functions (chunbaek)
        if: inputs.deploy_target == 'functions-chunbaek' || inputs.deploy_target == 'hosting-and-chunbaek'
        run: npx firebase-tools@13.29.1 deploy --only functions:chunbaek --project dmc-attendance --non-interactive

      - name: Deploy Hosting
        if: inputs.deploy_target == 'hosting' || inputs.deploy_target == 'hosting-and-chunbaek'
        run: npx firebase-tools@13.29.1 deploy --only hosting --project dmc-attendance --non-interactive

      - name: Smoke test — chunbaek API ping
        if: inputs.deploy_target == 'functions-chunbaek' || inputs.deploy_target == 'hosting-and-chunbaek'
        run: |
          body="$(curl -fsS "https://dmc-attendance.web.app/api/chunbaek?action=ping")"
          echo "$body"
          echo "$body" | grep -q '"ok":true'

      - name: Smoke test — chunbaek hosting
        if: inputs.deploy_target == 'hosting' || inputs.deploy_target == 'hosting-and-chunbaek'
        run: |
          code="$(curl -sS -o /dev/null -w "%{http_code}" "https://dmc-attendance.web.app/chunbaek/")"
          echo "HTTP $code"
          test "$code" = "200"
