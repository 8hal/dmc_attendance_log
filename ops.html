<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMC Ops</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0F172A; color: #E2E8F0; padding: 16px; font-size: 13px; line-height: 1.5; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .header h1 { font-size: 15px; color: #94A3B8; }
    .header a { color: #64748B; font-size: 12px; text-decoration: none; }
    .card { background: #1E293B; border-radius: 8px; padding: 14px; margin-bottom: 12px; }
    .card-title { font-size: 13px; font-weight: 700; color: #CBD5E1; margin-bottom: 10px; }
    .badge-ok { display: inline-block; padding: 2px 8px; border-radius: 4px; background: #064E3B; color: #6EE7B7; font-size: 11px; font-weight: 600; }
    .badge-warn { display: inline-block; padding: 2px 8px; border-radius: 4px; background: #7C2D12; color: #FCA5A5; font-size: 11px; font-weight: 600; }
    .badge-partial { display: inline-block; padding: 2px 8px; border-radius: 4px; background: #78350F; color: #FCD34D; font-size: 11px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { text-align: left; padding: 4px 8px; color: #64748B; font-weight: 600; border-bottom: 1px solid #334155; }
    td { padding: 4px 8px; border-bottom: 1px solid #1E293B; }
    .num { text-align: center; font-variant-numeric: tabular-nums; }
    .mismatch { color: #FCA5A5; font-weight: 600; }
    .log-row { padding: 5px 0; border-bottom: 1px solid #334155; display: flex; gap: 10px; }
    .log-date { color: #94A3B8; font-weight: 600; white-space: nowrap; }
    .log-detail { color: #64748B; }
    .loading { color: #64748B; text-align: center; padding: 20px; }
    .refresh-btn { background: #334155; color: #94A3B8; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    .refresh-btn:hover { background: #475569; }
    .stat-row { display: flex; gap: 16px; margin-bottom: 10px; }
    .stat { flex: 1; background: #334155; border-radius: 6px; padding: 10px; text-align: center; }
    .stat-val { font-size: 20px; font-weight: 700; color: #F8FAFC; }
    .stat-label { font-size: 11px; color: #64748B; margin-top: 2px; }
    .alert-row { display: flex; align-items: flex-start; gap: 8px; padding: 7px 0; border-bottom: 1px solid #334155; }
    .alert-row:last-child { border-bottom: none; }
    .alert-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .alert-msg { font-size: 12px; color: #F1F5F9; flex: 1; }
    .alert-time { font-size: 11px; color: #64748B; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚙️ DMC Ops Console</h1>
    <div>
      <button class="refresh-btn" onclick="loadAll()">↻ 새로고침</button>
      <a href="report.html">← report</a>
    </div>
  </div>

  <!-- Section 1: 시스템 건강도 -->
  <div id="systemHealth"></div>

  <!-- Section 2: 스크래핑 건강도 -->
  <div class="card" id="scrapeHealthCard"><div class="loading">로딩 중...</div></div>

  <!-- Section 3: 주말 준비 상태 (목/금만 표시) -->
  <div class="card" id="weekendReadinessCard" style="display: none;"><div class="loading">로딩 중...</div></div>

  <!-- Section 4: 전환율 · Section 5: 고러닝 · Section 6–7: 알림·로그 · 하단: 무결성 -->
  <div class="card" id="memberStatsCard"><div class="loading">로딩 중...</div></div>
  <div class="card" id="gorunningEventsCard"><div class="loading">로딩 중...</div></div>
  <div class="card" id="scrapeAlertsCard"><div class="loading">로딩 중...</div></div>
  <div class="card" id="logsCard"><div class="loading">로딩 중...</div></div>
  <div class="card" id="integrityCard"><div class="loading">로딩 중...</div></div>

  <script>
    const API_BASE = location.hostname === "localhost"
      ? "http://127.0.0.1:5001/dmc-attendance/asia-northeast3/race"
      : "https://race-nszximpvtq-du.a.run.app";

    function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

    function renderSystemHealth(intData) {
      const issues = intData.issues || [];
      const totalJobs = intData.totalJobs || 0;
      const totalResults = intData.totalResults || 0;

      let status = "✅ 시스템 정상 운영 중";
      let statusColor = "#064E3B";

      if (issues.length >= 6) {
        status = "🔴 긴급: 시스템 점검 필요";
        statusColor = "#7C2D12";
      } else if (issues.length >= 1) {
        status = "⚠️ 주의: 데이터 무결성 이슈";
        statusColor = "#78350F";
      }

      document.getElementById("systemHealth").innerHTML = `
        <div class="stat-row" style="margin-bottom: 16px;">
          <div class="card" style="flex: 1; background: ${statusColor};">
            <div style="font-size: 15px; font-weight: 700; color: #F8FAFC;">${status}</div>
            <div style="font-size: 13px; color: #E2E8F0; margin-top: 4px;">
              총 Jobs: ${totalJobs} | 총 Records: ${totalResults} | Phantom Jobs: ${issues.length}
            </div>
          </div>
        </div>`;
    }

    async function renderScrapeHealth() {
      try {
        const res = await fetch(`${API_BASE}?action=ops-scrape-health`);
        const data = await res.json();

        if (!data.ok) {
          document.getElementById("scrapeHealthCard").innerHTML =
            '<div class="card-title">🔍 스크래핑 건강도</div><span class="badge-warn">로드 실패</span>';
          return;
        }

        const overall = data.overall || {};
        const bySource = data.bySource || {};

        const statusBadge = (rate) => {
          if (rate >= 90) return '<span class="badge-ok">✅ 정상</span>';
          if (rate >= 80) return '<span class="badge-partial">⚠️ 주의</span>';
          return '<span class="badge-warn">🔴 긴급</span>';
        };

        let html = `
        <div class="card-title">🔍 스크래핑 건강도 (최근 7일) <button type="button" class="refresh-btn" onclick="renderScrapeHealth()">↻</button></div>

        <div style="margin-bottom: 12px;">
          <div style="font-size: 16px; font-weight: 700; color: #F8FAFC;">
            전체 Success Rate: ${overall.rate || 0}% (${overall.success || 0}/${overall.total || 0} jobs)
          </div>
          <div style="font-size: 13px; color: #94A3B8; margin-top: 4px;">
            Failed: ${overall.failed || 0}건 | Stale: ${overall.stale || 0}건 | Stuck: ${overall.stuck || 0}건
          </div>
        </div>

        <div style="font-size: 11px; color: #64748B; margin: 10px 0 6px; font-weight: 600;">소스별 건강도:</div>
        <table><tr><th>소스</th><th class="num">Success Rate</th><th>상태</th></tr>`;

        for (const [src, s] of Object.entries(bySource)) {
          if (src === "manual") {
            html += `<tr><td>${src}</td><td class="num">—</td><td>수동 입력</td></tr>`;
          } else {
            html += `<tr><td>${src}</td><td class="num">${s.rate || 0}% (${s.success || 0}/${s.total || 0})</td><td>${statusBadge(s.rate || 0)}</td></tr>`;
          }
        }

        html += `</table>
        <div style="font-size: 11px; color: #64748B; margin-top: 10px;">
          마지막 업데이트: ${new Date(data.lastCheck).toLocaleString("ko-KR")}
        </div>`;

        document.getElementById("scrapeHealthCard").innerHTML = html;
      } catch (e) {
        document.getElementById("scrapeHealthCard").innerHTML =
          '<div class="card-title">🔍 스크래핑 건강도</div><span class="badge-warn">로드 실패</span>';
      }
    }

    async function renderWeekendReadiness() {
      const today = new Date();
      const dayOfWeek = today.getDay();

      if (dayOfWeek !== 4 && dayOfWeek !== 5) {
        document.getElementById("weekendReadinessCard").style.display = "none";
        return;
      }

      document.getElementById("weekendReadinessCard").style.display = "block";

      try {
        const res = await fetch(`${API_BASE}?action=ops-scrape-health`);
        const data = await res.json();

        if (!data.ok) {
          document.getElementById("weekendReadinessCard").innerHTML =
            '<div class="card-title">🏃 주말 대회 준비 상태</div><span class="badge-warn">로드 실패</span>';
          return;
        }

        const upcomingWeekend = data.upcomingWeekend || [];
        const bySource = data.bySource || {};

        let overallStatus = "✅ 정상";
        for (const e of upcomingWeekend) {
          const src = e.source;
          if (bySource[src] && bySource[src].rate < 80) {
            overallStatus = "🔴 긴급 (점검 필요)";
            break;
          } else if (bySource[src] && bySource[src].rate < 90) {
            overallStatus = "⚠️ 주의 (모니터링 필요)";
          }
        }

        let html = `
        <div class="card-title">🏃 주말 대회 준비 상태</div>

        <div style="margin-bottom: 12px;">
          <div style="font-size: 15px; font-weight: 700; color: #F8FAFC;">
            다가오는 주말 대회: ${upcomingWeekend.length}개
          </div>
          <div style="font-size: 13px; color: #94A3B8; margin-top: 4px;">
            전체 준비 상태: ${overallStatus}
          </div>
        </div>

        <div style="font-size: 11px; color: #64748B; margin: 10px 0 6px; font-weight: 600;">예정 대회:</div>`;

        if (upcomingWeekend.length === 0) {
          html += '<div style="color: #64748B;">주말 예정 대회 없음</div>';
        } else {
          const dowKo = ["일", "월", "화", "수", "목", "금", "토"];
          upcomingWeekend.forEach((e) => {
            const srcHealth = bySource[e.source];
            const srcStatus = srcHealth && srcHealth.rate >= 90 ? "✅" : srcHealth && srcHealth.rate >= 80 ? "⚠️" : "🔴";
            html += `<div style="padding: 5px 0; border-bottom: 1px solid #334155;">
            ${esc(e.date)} (${dowKo[new Date(e.date).getDay()]}) ${esc(e.eventName)} [${esc(e.source)} ${srcStatus}]
          </div>`;
          });
        }

        const metaRes = await fetch(`${API_BASE}?action=ops-meta-last-weekend-check`).catch(() => null);
        if (metaRes && metaRes.ok) {
          const metaData = await metaRes.json();
          if (metaData.checkedAt) {
            html += `<div style="font-size: 11px; color: #64748B; margin-top: 10px;">
            📧 마지막 이메일 알림: ${new Date(metaData.checkedAt).toLocaleString("ko-KR")}
          </div>`;
          }
        }

        document.getElementById("weekendReadinessCard").innerHTML = html;
      } catch (e) {
        document.getElementById("weekendReadinessCard").innerHTML =
          '<div class="card-title">🏃 주말 대회 준비 상태</div><span class="badge-warn">로드 실패</span>';
      }
    }

    async function renderGorunningEvents() {
      try {
        const res = await fetch(`${API_BASE}?action=ops-gorunning-events`);
        const data = await res.json();

        if (!data.ok) {
          document.getElementById("gorunningEventsCard").innerHTML =
            '<div class="card-title">📅 고러닝 예정 대회</div><span class="badge-warn">로드 실패</span>';
          return;
        }

        const events = data.events || [];
        const matched = events.filter(e => e.matchStatus === "matched").length;
        const notMatched = events.filter(e => e.matchStatus === "not_matched").length;

        const lastStr = data.lastCrawled
          ? new Date(data.lastCrawled).toLocaleString("ko-KR")
          : "—";
        const dowKo = ["일", "월", "화", "수", "목", "금", "토"];

        let html = `
          <div class="card-title">
            📅 고러닝 예정 대회 (향후 2개월)
            <button type="button" class="refresh-btn" onclick="renderGorunningEvents()">↻</button>
          </div>

          <div style="font-size: 11px; color: #94A3B8; margin-bottom: 10px;">
            마지막 업데이트: ${lastStr} ${data.cached ? "(캐시)" : ""}<br/>
            총 ${events.length}개 대회 | 스크랩 가능: ${matched}개 | 수동 필요: ${notMatched}개
          </div>`;

        if (events.length === 0) {
          html += '<div style="color: #64748B;">예정 대회 없음</div>';
        } else {
          events.slice(0, 20).forEach((e) => {
            const isMatched = e.matchStatus === "matched";
            const statusIcon = isMatched ? "✅" : "🔍";
            const statusText = isMatched ? "스크랩 가능" : "수동 검색 필요";
            const d = e.date ? new Date(e.date) : null;
            const dow = d && !isNaN(d.getTime()) ? dowKo[d.getDay()] : "?";

            html += `
              <div style="padding: 10px; margin: 8px 0; background: #0F172A; border-radius: 6px; border-left: 3px solid ${isMatched ? "#6EE7B7" : "#FCA5A5"};">
                <div style="font-size: 13px; font-weight: 700; color: #F8FAFC;">
                  ${esc(e.date || "")} (${dow}) ${esc(e.name || "")}
                </div>
                <div style="font-size: 12px; color: #94A3B8; margin-top: 4px;">
                  ${statusIcon} ${statusText}`;

            if (isMatched && e.matchedJob) {
              html += ` (${esc(String(e.matchedJob.source || ""))}_${esc(String(e.matchedJob.sourceId || ""))})`;
              html += ` <a href="report.html" style="color: #60A5FA; text-decoration: none;">[발견 완료 →]</a>`;
            } else {
              html += `<br/><span style="font-size: 11px; color: #64748B;">
                💡 액션: report.html "발견"에서 수동 검색 또는 기록 사이트(smartchip, myresult, spct, marazone 등)에서 직접 확인 필요
              </span>`;
              html += ` <a href="report.html" style="color: #60A5FA; text-decoration: none;">[수동 검색 →]</a>`;
            }

            html += `</div></div>`;
          });
        }

        document.getElementById("gorunningEventsCard").innerHTML = html;
      } catch (err) {
        console.error("고러닝 로드 실패:", err);
        document.getElementById("gorunningEventsCard").innerHTML =
          '<div class="card-title">📅 고러닝 예정 대회</div><span class="badge-warn">오류 발생</span>';
      }
    }

    async function loadAll() {
      const results = await Promise.all([
        fetch(`${API_BASE}?action=event-logs&limit=200`),
        fetch(`${API_BASE}?action=data-integrity`),
        fetch(`${API_BASE}?action=member-stats`),
        renderScrapeHealth(),
        renderWeekendReadiness(),
      ]);
      const logsRes = results[0];
      const intRes = results[1];
      const statsRes = results[2];

      const logsData = await logsRes.json();
      const intData = await intRes.json();
      const statsData = await statsRes.json();

      renderSystemHealth(intData);
      renderMemberStats(statsData);
      await renderGorunningEvents();
      renderScrapeAlerts(logsData);
      renderLogs(logsData);
      renderIntegrity(intData);
    }

    function renderMemberStats(s) {
      const el = document.getElementById("memberStatsCard");
      if (!s.ok) { el.innerHTML = '<div class="card-title">📊 전환율</div><span class="badge-warn">로드 실패</span>'; return; }

      const f = s.funnel || {};
      const base = f.page_load || 1;
      const pct = (n) => base > 0 ? Math.round(n / base * 100) : 0;
      const arrow = (cur, prev) => {
        const p = prev || 1;
        const r = Math.round(cur / p * 100);
        return `<span style="color:#64748B;font-size:11px;">▼${100-r}% 이탈</span>`;
      };

      const src = s.confirmSource || {};
      const totalSrc = (src.personal||0) + (src.operator||0) + (src.other||0);
      const srcPct = (n) => totalSrc > 0 ? Math.round(n/totalSrc*100) : 0;

      el.innerHTML = `
        <div class="card-title">📊 전환율 & 퍼널 (UA 기준, 최근 30일)</div>
        <div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
          <div class="stat" style="min-width:100px;">
            <div class="stat-val">${s.postLaunchRate || 0}%</div>
            <div class="stat-label">배포 후 전환율<br/>(${s.postLaunchMembers}/${s.totalMembers}명)</div>
          </div>
          <div class="stat" style="min-width:100px;">
            <div class="stat-val">${s.totalConfirmedRecords || 0}</div>
            <div class="stat-label">총 확정 기록</div>
          </div>
        </div>

        <div style="margin-bottom:12px;">
          <div style="font-size:11px;color:#64748B;margin-bottom:6px;font-weight:600;">퍼널 (UA 기준)</div>
          <table><tr><th>단계</th><th class="num">UA 수</th><th class="num">전체 대비</th><th></th></tr>
            <tr><td>방문</td><td class="num">${f.page_load||0}</td><td class="num">100%</td><td></td></tr>
            <tr><td>회원 선택</td><td class="num">${f.select_member||0}</td><td class="num">${pct(f.select_member||0)}%</td><td>${arrow(f.select_member||0, f.page_load||1)}</td></tr>
            <tr><td>검색 시작</td><td class="num">${f.search_start||0}</td><td class="num">${pct(f.search_start||0)}%</td><td>${arrow(f.search_start||0, f.select_member||1)}</td></tr>
            <tr><td style="color:#FCA5A5;font-weight:600;">결과 완료 ⚠️</td><td class="num">${f.search_complete||0}</td><td class="num">${pct(f.search_complete||0)}%</td><td>${arrow(f.search_complete||0, f.search_start||1)}</td></tr>
            <tr><td>확정(저장)</td><td class="num">${f.search_save||0}</td><td class="num">${pct(f.search_save||0)}%</td><td>${arrow(f.search_save||0, f.search_complete||1)}</td></tr>
          </table>
        </div>

        <div>
          <div style="font-size:11px;color:#64748B;margin-bottom:6px;font-weight:600;">확정 경로 (건 기준)</div>
          <table><tr><th>경로</th><th class="num">건수</th><th class="num">비율</th></tr>
            <tr><td>🔍 회원 직접 입력 (personal)</td><td class="num">${src.personal||0}</td><td class="num">${srcPct(src.personal||0)}%</td></tr>
            <tr><td>📋 운영자 입력 (operator)</td><td class="num">${src.operator||0}</td><td class="num">${srcPct(src.operator||0)}%</td></tr>
            <tr><td>기타/이전</td><td class="num">${src.other||0}</td><td class="num">${srcPct(src.other||0)}%</td></tr>
          </table>
        </div>`;
    }

    function renderScrapeAlerts(logsData) {
      const logs = logsData.logs || [];
      const alerts = logs.filter(l => l.type === "scrape_alert" || l.type === "weekend_check").slice(0, 10);
      const el = document.getElementById("scrapeAlertsCard");
      let html = '<div class="card-title">🚨 최근 알림</div>';

      if (alerts.length === 0) {
        html += '<span class="badge-ok">✓ 이상 없음</span>';
      } else {
        html += `<span class="badge-warn">${alerts.length}건</span><div style="margin-top:8px;">`;
        for (const a of alerts) {
          const icon = a.severity === "error" ? "🔴" : "🟡";
          const time = (a.timestamp || a.checkedAt || "").slice(0, 16).replace("T", " ");
          html += `<div class="alert-row">
            <span class="alert-icon">${icon}</span>
            <span class="alert-msg">${esc(a.message || "")}</span>
            <span class="alert-time">${time}</span>
          </div>`;
        }
        html += '</div>';
      }
      el.innerHTML = html;
    }

    function renderIntegrity(intData) {
      const issues = intData.issues || [];
      const el = document.getElementById("integrityCard");
      let html = `<div class="card-title">🔍 데이터 무결성 <span style="color:#64748B;font-weight:400;">(전체 ${intData.totalJobs ?? "-"}잡 / ${intData.totalResults ?? "-"}건)</span></div>`;

      if (issues.length === 0) {
        html += '<span class="badge-ok">✓ 정상</span>';
      } else {
        html += `<span class="badge-warn">phantom ${issues.length}건</span>
          <div style="font-size:11px;color:#64748B;margin:6px 0;">confirmed 상태이나 race_results가 없는 잡입니다.</div>
          <table><tr><th>대회</th><th>jobId</th></tr>`;
        for (const iss of issues) {
          html += `<tr><td>${esc(iss.eventName || "-")}</td><td style="font-size:11px;color:#94A3B8;">${esc(iss.jobId)}</td></tr>`;
        }
        html += '</table>';
      }
      el.innerHTML = html;
    }

    function renderLogs(logsData) {
      const logs = logsData.logs || [];
      const el = document.getElementById("logsCard");
      let html = `<div class="card-title">📋 이벤트 로그 <span style="color:#64748B;font-weight:400;">(최근 ${logs.length}건)</span></div>`;

      if (logs.length === 0) {
        html += '<div style="color:#64748B;">로그 없음</div>';
      } else {
        const grouped = {};
        logs.forEach(l => {
          const d = (l.timestamp || "").slice(0, 10);
          grouped[d] = grouped[d] || [];
          grouped[d].push(l);
        });
        for (const [date, items] of Object.entries(grouped)) {
          const summary = {};
          items.forEach(l => { summary[l.event] = (summary[l.event] || 0) + 1; });
          const members = new Set(items.filter(l => l.data?.member).map(l => l.data.member));
          const parts = Object.entries(summary).map(([k, v]) => `${k}:${v}`).join("  ");
          html += `<div class="log-row">
            <span class="log-date">${date}</span>
            <span>${parts}</span>
            <span class="log-detail">${members.size > 0 ? members.size + "명" : ""}</span>
          </div>`;
        }
      }
      el.innerHTML = html;
    }

    loadAll();
  </script>
</body>
</html>
