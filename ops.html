<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMC Ops</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0F172A; color: #E2E8F0; padding: 16px; font-size: 13px; line-height: 1.5; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .header h1 { font-size: 15px; color: #94A3B8; }
    .header a { color: #64748B; font-size: 12px; text-decoration: none; }
    .card { background: #1E293B; border-radius: 8px; padding: 14px; margin-bottom: 12px; }
    .card-title { font-size: 13px; font-weight: 700; color: #CBD5E1; margin-bottom: 10px; }
    .badge-ok { display: inline-block; padding: 2px 8px; border-radius: 4px; background: #064E3B; color: #6EE7B7; font-size: 11px; font-weight: 600; }
    .badge-warn { display: inline-block; padding: 2px 8px; border-radius: 4px; background: #7C2D12; color: #FCA5A5; font-size: 11px; font-weight: 600; }
    .badge-partial { display: inline-block; padding: 2px 8px; border-radius: 4px; background: #78350F; color: #FCD34D; font-size: 11px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { text-align: left; padding: 4px 8px; color: #64748B; font-weight: 600; border-bottom: 1px solid #334155; }
    td { padding: 4px 8px; border-bottom: 1px solid #1E293B; }
    .num { text-align: center; font-variant-numeric: tabular-nums; }
    .mismatch { color: #FCA5A5; font-weight: 600; }
    .log-row { padding: 5px 0; border-bottom: 1px solid #334155; display: flex; gap: 10px; }
    .log-date { color: #94A3B8; font-weight: 600; white-space: nowrap; }
    .log-detail { color: #64748B; }
    .loading { color: #64748B; text-align: center; padding: 20px; }
    .refresh-btn { background: #334155; color: #94A3B8; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    .refresh-btn:hover { background: #475569; }
    .stat-row { display: flex; gap: 16px; margin-bottom: 10px; }
    .stat { flex: 1; background: #334155; border-radius: 6px; padding: 10px; text-align: center; }
    .stat-val { font-size: 20px; font-weight: 700; color: #F8FAFC; }
    .stat-label { font-size: 11px; color: #64748B; margin-top: 2px; }
    .alert-row { display: flex; align-items: flex-start; gap: 8px; padding: 7px 0; border-bottom: 1px solid #334155; }
    .alert-row:last-child { border-bottom: none; }
    .alert-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .alert-msg { font-size: 12px; color: #F1F5F9; flex: 1; }
    .alert-time { font-size: 11px; color: #64748B; white-space: nowrap; }
  </style>
</head>
<body>
  <div id="authOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999;">
    <div class="auth-card" style="background:#fff;padding:32px;border-radius:12px;min-width:320px;text-align:center;">
      <h2 style="margin-bottom:8px;">운영 콘솔</h2>
      <p style="font-size:13px;color:#64748B;margin-bottom:16px;">오너 전용 페이지입니다.</p>
      <input id="authPw" type="password" placeholder="비밀번호" style="width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:8px;" />
      <button onclick="tryAuth()" style="width:100%;padding:8px;background:#3b82f6;color:#fff;border:none;border-radius:8px;cursor:pointer;">확인</button>
      <div id="authError" style="display:none;color:#DC2626;font-size:12px;margin-top:8px;">
        비밀번호가 올바르지 않습니다.
      </div>
    </div>
  </div>

  <div class="header">
    <h1>⚙️ DMC Ops Console</h1>
    <div>
      <button class="refresh-btn" onclick="loadAll()">↻ 새로고침</button>
      <a href="report.html">← report</a>
    </div>
  </div>

  <!-- Section 1: 시스템 건강도 -->
  <div id="systemHealth"></div>

  <!-- Section 2: 스크래핑 건강도 -->
  <div class="card" id="scrapeHealthCard"><div class="loading">로딩 중...</div></div>

  <!-- Section 3: 주말 준비 상태 (목/금만 표시) -->
  <div class="card" id="weekendReadinessCard" style="display: none;"><div class="loading">로딩 중...</div></div>

  <!-- Section 4: 전환율 -->
  <div class="card" id="memberStatsCard"><div class="loading">로딩 중...</div></div>

  <!-- Section 5: 예정 대회 -->
  <div class="card" id="gorunningEventsCard"><div class="loading">로딩 중...</div></div>
  <div class="card" id="scrapeAlertsCard"><div class="loading">로딩 중...</div></div>
  <div class="card" id="logsCard"><div class="loading">로딩 중...</div></div>
  <div class="card" id="integrityCard"><div class="loading">로딩 중...</div></div>

  <!-- 경고 배너 -->
  <div id="groupAlertBanner" style="display:none;background:#fef3c7;border:1px solid #fbbf24;padding:10px 16px;border-radius:8px;margin-bottom:16px;font-size:14px;color:#1e293b;"></div>

  <!-- 단체 대회 섹션 -->
  <section id="groupEventsSection" style="margin-top:32px;">
    <h2 style="font-size:18px;font-weight:600;margin-bottom:12px;color:#E2E8F0;">단체 대회 기록 소스 관리</h2>
    <div id="groupEventsList"></div>
  </section>

  <script>
    const API_BASE = location.hostname === "localhost"
      ? "http://127.0.0.1:5001/dmc-attendance/asia-northeast3/race"
      : "https://race-nszximpvtq-du.a.run.app";

    const OPS_AUTH_KEY = "dmc_ops_owner_verified";

    function apiBase() {
      return API_BASE;
    }

    function getOwnerPw() {
      return sessionStorage.getItem(OPS_AUTH_KEY) || "";
    }

    async function tryAuth() {
      const pw = document.getElementById("authPw").value;
      try {
        const res = await fetch(`${apiBase()}?action=verify-admin`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pw }),
        });
        const data = await res.json();
        if (data.ok && data.role === "owner") {
          sessionStorage.setItem(OPS_AUTH_KEY, pw);
          document.getElementById("authOverlay").style.display = "none";
          initOps();
        } else {
          document.getElementById("authError").style.display = "block";
        }
      } catch (e) {
        console.error("[tryAuth]", e);
        document.getElementById("authError").style.display = "block";
      }
    }

    function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

    function renderSystemHealth(intData) {
      const issues = intData.issues || [];
      const totalJobs = intData.totalJobs || 0;
      const totalResults = intData.totalResults || 0;

      let status = "✅ 시스템 정상 운영 중";
      let statusColor = "#064E3B";

      if (issues.length >= 6) {
        status = "🔴 긴급: 시스템 점검 필요";
        statusColor = "#7C2D12";
      } else if (issues.length >= 1) {
        status = "⚠️ 주의: 데이터 무결성 이슈";
        statusColor = "#78350F";
      }

      document.getElementById("systemHealth").innerHTML = `
        <div class="stat-row" style="margin-bottom: 16px;">
          <div class="card" style="flex: 1; background: ${statusColor};">
            <div style="font-size: 15px; font-weight: 700; color: #F8FAFC;">${status}</div>
            <div style="font-size: 13px; color: #E2E8F0; margin-top: 4px;">
              총 Jobs: ${totalJobs} | 총 Records: ${totalResults} | Phantom Jobs: ${issues.length}
            </div>
          </div>
        </div>`;
    }

    async function renderScrapeHealth() {
      try {
        const res = await fetch(`${API_BASE}?action=ops-scrape-health`);
        const data = await res.json();

        if (!data.ok) {
          document.getElementById("scrapeHealthCard").innerHTML =
            '<div class="card-title">🔍 스크래핑 건강도</div><span class="badge-warn">로드 실패</span>';
          return;
        }

        const overall = data.overall || {};
        const bySource = data.bySource || {};

        const statusBadge = (rate) => {
          if (rate >= 90) return '<span class="badge-ok">✅ 정상</span>';
          if (rate >= 80) return '<span class="badge-partial">⚠️ 주의</span>';
          return '<span class="badge-warn">🔴 긴급</span>';
        };

        let html = `
        <div class="card-title">🔍 스크래핑 건강도 (최근 7일) <button type="button" class="refresh-btn" onclick="renderScrapeHealth()">↻</button></div>

        <div style="margin-bottom: 12px;">
          <div style="font-size: 16px; font-weight: 700; color: #F8FAFC;">
            전체 Success Rate: ${overall.rate || 0}% (${overall.success || 0}/${overall.total || 0} jobs)
          </div>
          <div style="font-size: 13px; color: #94A3B8; margin-top: 4px;">
            Failed: ${overall.failed || 0}건 | Stale: ${overall.stale || 0}건 | Stuck: ${overall.stuck || 0}건
          </div>
        </div>

        <div style="font-size: 11px; color: #64748B; margin: 10px 0 6px; font-weight: 600;">소스별 건강도:</div>
        <table><tr><th>소스</th><th class="num">Success Rate</th><th>상태</th></tr>`;

        for (const [src, s] of Object.entries(bySource)) {
          if (src === "manual") {
            html += `<tr><td>${src}</td><td class="num">—</td><td>수동 입력</td></tr>`;
          } else {
            html += `<tr><td>${src}</td><td class="num">${s.rate || 0}% (${s.success || 0}/${s.total || 0})</td><td>${statusBadge(s.rate || 0)}</td></tr>`;
          }
        }

        html += `</table>
        <div style="font-size: 11px; color: #64748B; margin-top: 10px;">
          마지막 업데이트: ${new Date(data.lastCheck).toLocaleString("ko-KR")}
        </div>`;

        document.getElementById("scrapeHealthCard").innerHTML = html;
      } catch (e) {
        document.getElementById("scrapeHealthCard").innerHTML =
          '<div class="card-title">🔍 스크래핑 건강도</div><span class="badge-warn">로드 실패</span>';
      }
    }

    async function renderWeekendReadiness() {
      const today = new Date();
      const dayOfWeek = today.getDay();

      if (dayOfWeek !== 4 && dayOfWeek !== 5) {
        document.getElementById("weekendReadinessCard").style.display = "none";
        return;
      }

      document.getElementById("weekendReadinessCard").style.display = "block";

      try {
        const res = await fetch(`${API_BASE}?action=ops-scrape-health`);
        const data = await res.json();

        if (!data.ok) {
          document.getElementById("weekendReadinessCard").innerHTML =
            '<div class="card-title">🏃 주말 대회 준비 상태</div><span class="badge-warn">로드 실패</span>';
          return;
        }

        const upcomingWeekend = data.upcomingWeekend || [];
        const bySource = data.bySource || {};

        let overallStatus = "✅ 정상";
        for (const e of upcomingWeekend) {
          const src = e.source;
          if (bySource[src] && bySource[src].rate < 80) {
            overallStatus = "🔴 긴급 (점검 필요)";
            break;
          } else if (bySource[src] && bySource[src].rate < 90) {
            overallStatus = "⚠️ 주의 (모니터링 필요)";
          }
        }

        let html = `
        <div class="card-title">🏃 주말 대회 준비 상태</div>

        <div style="margin-bottom: 12px;">
          <div style="font-size: 15px; font-weight: 700; color: #F8FAFC;">
            다가오는 주말 대회: ${upcomingWeekend.length}개
          </div>
          <div style="font-size: 13px; color: #94A3B8; margin-top: 4px;">
            전체 준비 상태: ${overallStatus}
          </div>
        </div>

        <div style="font-size: 11px; color: #64748B; margin: 10px 0 6px; font-weight: 600;">예정 대회:</div>`;

        if (upcomingWeekend.length === 0) {
          html += '<div style="color: #64748B;">주말 예정 대회 없음</div>';
        } else {
          const dowKo = ["일", "월", "화", "수", "목", "금", "토"];
          upcomingWeekend.forEach((e) => {
            const srcHealth = bySource[e.source];
            const srcStatus = srcHealth && srcHealth.rate >= 90 ? "✅" : srcHealth && srcHealth.rate >= 80 ? "⚠️" : "🔴";
            html += `<div style="padding: 5px 0; border-bottom: 1px solid #334155;">
            ${esc(e.date)} (${dowKo[new Date(e.date).getDay()]}) ${esc(e.eventName)} [${esc(e.source)} ${srcStatus}]
          </div>`;
          });
        }

        const metaRes = await fetch(`${API_BASE}?action=ops-meta-last-weekend-check`).catch(() => null);
        if (metaRes && metaRes.ok) {
          const metaData = await metaRes.json();
          if (metaData.checkedAt) {
            html += `<div style="font-size: 11px; color: #64748B; margin-top: 10px;">
            📧 마지막 이메일 알림: ${new Date(metaData.checkedAt).toLocaleString("ko-KR")}
          </div>`;
          }
        }

        document.getElementById("weekendReadinessCard").innerHTML = html;
      } catch (e) {
        document.getElementById("weekendReadinessCard").innerHTML =
          '<div class="card-title">🏃 주말 대회 준비 상태</div><span class="badge-warn">로드 실패</span>';
      }
    }

    let gorunningDisplayCount = 20;
    let gorunningFilteredEvents = [];

    async function renderGorunningEvents() {
      try {
        const res = await fetch(`${API_BASE}?action=ops-gorunning-events`);
        const data = await res.json();

        if (!data.ok) {
          document.getElementById("gorunningEventsCard").innerHTML =
            '<div class="card-title">📅 예정 대회 (고러닝 + 러닝위키)</div><span class="badge-warn">로드 실패</span>';
          return;
        }

        const events = data.events || [];
        
        // 전역 변수에 저장 (필터링에 사용)
        window.gorunningAllEvents = events;
        window.gorunningLastCrawled = data.lastCrawled;
        window.gorunningCached = data.cached;
        
        // 오늘 이후 대회만 필터링
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const upcoming = events.filter(e => {
          if (!e.date) return false;
          const eventDate = new Date(e.date);
          return eventDate >= today;
        });
        
        // 날짜순 정렬 (가까운 대회부터)
        gorunningFilteredEvents = upcoming.sort((a, b) => {
          const dateA = new Date(a.date).getTime();
          const dateB = new Date(b.date).getTime();
          return dateA - dateB;
        });
        
        gorunningDisplayCount = 20;
        renderGorunningList();
      } catch (err) {
        console.error("고러닝 로드 실패:", err);
        document.getElementById("gorunningEventsCard").innerHTML =
          '<div class="card-title">📅 예정 대회 (고러닝 + 러닝위키)</div><span class="badge-warn">오류 발생</span>';
      }
    }

    function filterGorunningEvents() {
      const searchQuery = (document.getElementById("gorunningSearch")?.value || "").trim().toLowerCase();
      const monthFilter = document.getElementById("gorunningMonth")?.value || "all";
      
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      gorunningFilteredEvents = [];
      
      // 전체 이벤트 다시 가져오기 (renderGorunningEvents에서 이미 정렬됨)
      const allEvents = window.gorunningAllEvents || [];
      
      gorunningFilteredEvents = allEvents.filter(e => {
        // 검색어 필터
        if (searchQuery && !(e.name || "").toLowerCase().includes(searchQuery)) {
          return false;
        }
        
        // 월 필터
        if (monthFilter !== "all" && e.date) {
          const eventDate = new Date(e.date);
          const eventMonth = eventDate.getMonth() + 1; // 1-12
          if (String(eventMonth) !== monthFilter) {
            return false;
          }
        }
        
        return true;
      });
      
      gorunningDisplayCount = 20;
      renderGorunningList();
    }

    function renderGorunningList() {
      const events = window.gorunningAllEvents || [];
      const scraped = events.filter(e => e.matchStatus === "scraped").length;
      const discovered = events.filter(e => e.matchStatus === "discovered").length;
      const notMatched = events.filter(e => e.matchStatus === "not_matched").length;
      
      const lastStr = window.gorunningLastCrawled
        ? new Date(window.gorunningLastCrawled).toLocaleString("ko-KR")
        : "—";
      const dowKo = ["일", "월", "화", "수", "목", "금", "토"];
      
      let html = `
        <div class="card-title" style="display:flex;align-items:center;justify-content:space-between;">
          <span>📅 예정 대회 (고러닝 + 러닝위키)</span>
          <button type="button" class="refresh-btn" onclick="refreshGorunningCache()" id="refreshCacheBtn" title="캐시를 새로고침합니다">
            🔄 캐시 새로고침
          </button>
        </div>

        <div style="font-size: 11px; color: #94A3B8; margin-bottom: 10px;">
          마지막 업데이트: ${lastStr} ${window.gorunningCached ? "(캐시)" : "(실시간)"}<br/>
          총 ${events.length}개 대회 | ✅ 스크랩 완료: ${scraped}개 | 🔍 발견: ${discovered}개 | ❓ 수동: ${notMatched}개
        </div>
        
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
          <input type="text" id="gorunningSearch" placeholder="대회명 검색..." 
            style="flex:1;min-width:200px;padding:6px 10px;border:1px solid #475569;border-radius:6px;background:#0F172A;color:#E2E8F0;font-size:13px;"
            oninput="filterGorunningEvents()" />
          <select id="gorunningMonth" onchange="filterGorunningEvents()"
            style="padding:6px 10px;border:1px solid #475569;border-radius:6px;background:#0F172A;color:#E2E8F0;font-size:13px;">
            <option value="all">전체 월</option>
            <option value="4">4월</option>
            <option value="5">5월</option>
            <option value="6">6월</option>
            <option value="7">7월</option>
            <option value="8">8월</option>
            <option value="9">9월</option>
            <option value="10">10월</option>
            <option value="11">11월</option>
            <option value="12">12월</option>
          </select>
        </div>`;

      if (gorunningFilteredEvents.length === 0) {
        html += '<div style="color: #64748B;">검색 결과 없음</div>';
      } else {
        const displayEvents = gorunningFilteredEvents.slice(0, gorunningDisplayCount);
        
        displayEvents.forEach((e) => {
          const status = e.matchStatus;
          let statusIcon, statusText, borderColor;

          if (status === "scraped") {
            statusIcon = "✅";
            statusText = "스크랩 완료";
            borderColor = "#6EE7B7";
          } else if (status === "discovered") {
            statusIcon = "🔍";
            statusText = "발견 가능";
            borderColor = "#60A5FA";
          } else {
            statusIcon = "❓";
            statusText = "수동 검색 필요";
            borderColor = "#FCA5A5";
          }

          const d = e.date ? new Date(e.date) : null;
          const dow = d && !isNaN(d.getTime()) ? dowKo[d.getDay()] : "?";

          html += `
            <div style="padding: 10px; margin: 8px 0; background: #1E293B; border-radius: 6px; border-left: 3px solid ${borderColor};">
              <div style="font-size: 13px; font-weight: 700; color: #F8FAFC;">
                ${esc(e.date || "")} (${dow}) ${esc(e.name || "")}
              </div>
              <div style="font-size: 12px; color: #94A3B8; margin-top: 4px;">
                ${statusIcon} ${statusText}`;

          if (status === "scraped" && e.matchedJob) {
            html += ` (${esc(String(e.matchedJob.source || ""))}_${esc(String(e.matchedJob.sourceId || ""))})`;
            html += ` <a href="report.html" style="color: #60A5FA; text-decoration: none;">[확정 완료 →]</a>`;
          } else if (status === "discovered" && e.matchedEvent) {
            html += ` (${esc(String(e.matchedEvent.source || ""))}_${esc(String(e.matchedEvent.sourceId || ""))})`;
            html += ` <a href="report.html" style="color: #60A5FA; text-decoration: none;">[스크랩 시작 →]</a>`;
          } else {
            html += `<br/><span style="font-size: 11px; color: #64748B;">
              💡 액션: report.html "발견"에서 수동 검색 또는 기록 사이트에서 직접 확인 필요
            </span>`;
            html += ` <a href="report.html" style="color: #60A5FA; text-decoration: none;">[수동 검색 →]</a>`;
          }

          html += `</div></div>`;
        });
        
        // 더보기 버튼
        if (gorunningDisplayCount < gorunningFilteredEvents.length) {
          const remaining = gorunningFilteredEvents.length - gorunningDisplayCount;
          html += `
            <div style="text-align:center;margin-top:12px;">
              <button onclick="loadMoreGorunning()" 
                style="padding:8px 16px;background:#475569;color:#E2E8F0;border:none;border-radius:6px;cursor:pointer;font-size:13px;">
                더보기 (${remaining}개 남음)
              </button>
            </div>`;
        }
      }

      document.getElementById("gorunningEventsCard").innerHTML = html;
    }

    function loadMoreGorunning() {
      gorunningDisplayCount += 20;
      renderGorunningList();
    }

    async function refreshGorunningCache() {
      const btn = document.getElementById("refreshCacheBtn");
      if (!btn) return;
      
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = "⏳ 새로고침 중...";
      btn.style.cursor = "not-allowed";
      
      try {
        // forceRefresh=true로 API 호출
        const res = await fetch(`${API_BASE}?action=ops-gorunning-events&forceRefresh=true`);
        const data = await res.json();
        
        if (!data.ok) {
          alert("캐시 새로고침 실패: " + (data.error || "알 수 없는 오류"));
          return;
        }
        
        // 전역 변수 업데이트
        window.gorunningAllEvents = data.events || [];
        window.gorunningLastCrawled = data.lastCrawled;
        window.gorunningCached = data.cached;
        
        // 화면 다시 렌더링
        gorunningDisplayCount = 20;
        renderGorunningList();
        
        alert(`✅ 캐시가 새로고침되었습니다!\n총 ${data.events?.length || 0}개 대회가 발견되었습니다.`);
      } catch (err) {
        console.error("캐시 새로고침 오류:", err);
        alert("캐시 새로고침 중 오류가 발생했습니다: " + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
        btn.style.cursor = "pointer";
      }
    }

    async function loadAll() {
      const results = await Promise.all([
        fetch(`${API_BASE}?action=event-logs&limit=200`),
        fetch(`${API_BASE}?action=data-integrity`),
        fetch(`${API_BASE}?action=member-stats`),
        renderScrapeHealth(),
        renderWeekendReadiness(),
        renderGorunningEvents(),
      ]);
      const logsRes = results[0];
      const intRes = results[1];
      const statsRes = results[2];

      const logsData = await logsRes.json();
      const intData = await intRes.json();
      const statsData = await statsRes.json();

      renderSystemHealth(intData);
      renderMemberStats(statsData);
      renderScrapeAlerts(logsData);
      renderLogs(logsData);
      renderIntegrity(intData);

      checkGroupEventAlerts();
      loadGroupEvents();
    }

    function renderMemberStats(s) {
      const el = document.getElementById("memberStatsCard");
      if (!s.ok) { el.innerHTML = '<div class="card-title">📊 전환율</div><span class="badge-warn">로드 실패</span>'; return; }

      const f = s.funnel || {};
      const base = f.page_load || 1;
      const pct = (n) => base > 0 ? Math.round(n / base * 100) : 0;
      const arrow = (cur, prev) => {
        const p = prev || 1;
        const r = Math.round(cur / p * 100);
        return `<span style="color:#64748B;font-size:11px;">▼${100-r}% 이탈</span>`;
      };

      const src = s.confirmSource || {};
      const totalSrc = (src.personal||0) + (src.operator||0) + (src.other||0);
      const srcPct = (n) => totalSrc > 0 ? Math.round(n/totalSrc*100) : 0;

      el.innerHTML = `
        <div class="card-title">📊 전환율 & 퍼널 (UA 기준, 최근 30일)</div>
        <div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
          <div class="stat" style="min-width:100px;">
            <div class="stat-val">${s.postLaunchRate || 0}%</div>
            <div class="stat-label">배포 후 전환율<br/>(${s.postLaunchMembers}/${s.totalMembers}명)</div>
          </div>
          <div class="stat" style="min-width:100px;">
            <div class="stat-val">${s.totalConfirmedRecords || 0}</div>
            <div class="stat-label">총 확정 기록</div>
          </div>
        </div>

        <div style="margin-bottom:12px;">
          <div style="font-size:11px;color:#64748B;margin-bottom:6px;font-weight:600;">퍼널 (UA 기준)</div>
          <table><tr><th>단계</th><th class="num">UA 수</th><th class="num">전체 대비</th><th></th></tr>
            <tr><td>방문</td><td class="num">${f.page_load||0}</td><td class="num">100%</td><td></td></tr>
            <tr><td>회원 선택</td><td class="num">${f.select_member||0}</td><td class="num">${pct(f.select_member||0)}%</td><td>${arrow(f.select_member||0, f.page_load||1)}</td></tr>
            <tr><td>검색 시작</td><td class="num">${f.search_start||0}</td><td class="num">${pct(f.search_start||0)}%</td><td>${arrow(f.search_start||0, f.select_member||1)}</td></tr>
            <tr><td style="color:#FCA5A5;font-weight:600;">결과 완료 ⚠️</td><td class="num">${f.search_complete||0}</td><td class="num">${pct(f.search_complete||0)}%</td><td>${arrow(f.search_complete||0, f.search_start||1)}</td></tr>
            <tr><td>확정(저장)</td><td class="num">${f.search_save||0}</td><td class="num">${pct(f.search_save||0)}%</td><td>${arrow(f.search_save||0, f.search_complete||1)}</td></tr>
          </table>
        </div>

        <div>
          <div style="font-size:11px;color:#64748B;margin-bottom:6px;font-weight:600;">확정 경로 (건 기준)</div>
          <table><tr><th>경로</th><th class="num">건수</th><th class="num">비율</th></tr>
            <tr><td>🔍 회원 직접 입력 (personal)</td><td class="num">${src.personal||0}</td><td class="num">${srcPct(src.personal||0)}%</td></tr>
            <tr><td>📋 운영자 입력 (operator)</td><td class="num">${src.operator||0}</td><td class="num">${srcPct(src.operator||0)}%</td></tr>
            <tr><td>기타/이전</td><td class="num">${src.other||0}</td><td class="num">${srcPct(src.other||0)}%</td></tr>
          </table>
        </div>`;
    }

    function renderScrapeAlerts(logsData) {
      const logs = logsData.logs || [];
      const alerts = logs.filter(l => l.type === "scrape_alert" || l.type === "weekend_check").slice(0, 10);
      const el = document.getElementById("scrapeAlertsCard");
      let html = '<div class="card-title">🚨 최근 알림</div>';

      if (alerts.length === 0) {
        html += '<span class="badge-ok">✓ 이상 없음</span>';
      } else {
        html += `<span class="badge-warn">${alerts.length}건</span><div style="margin-top:8px;">`;
        for (const a of alerts) {
          const icon = a.severity === "error" ? "🔴" : "🟡";
          const time = (a.timestamp || a.checkedAt || "").slice(0, 16).replace("T", " ");
          html += `<div class="alert-row">
            <span class="alert-icon">${icon}</span>
            <span class="alert-msg">${esc(a.message || "")}</span>
            <span class="alert-time">${time}</span>
          </div>`;
        }
        html += '</div>';
      }
      el.innerHTML = html;
    }

    function renderIntegrity(intData) {
      const issues = intData.issues || [];
      const el = document.getElementById("integrityCard");
      let html = `<div class="card-title">🔍 데이터 무결성 <span style="color:#64748B;font-weight:400;">(전체 ${intData.totalJobs ?? "-"}잡 / ${intData.totalResults ?? "-"}건)</span></div>`;

      if (issues.length === 0) {
        html += '<span class="badge-ok">✓ 정상</span>';
      } else {
        html += `<span class="badge-warn">phantom ${issues.length}건</span>
          <div style="font-size:11px;color:#64748B;margin:6px 0;">confirmed 상태이나 race_results가 없는 잡입니다.</div>
          <table><tr><th>대회</th><th>jobId</th></tr>`;
        for (const iss of issues) {
          html += `<tr><td>${esc(iss.eventName || "-")}</td><td style="font-size:11px;color:#94A3B8;">${esc(iss.jobId)}</td></tr>`;
        }
        html += '</table>';
      }
      el.innerHTML = html;
    }

    function renderLogs(logsData) {
      const logs = logsData.logs || [];
      const el = document.getElementById("logsCard");
      let html = `<div class="card-title">📋 이벤트 로그 <span style="color:#64748B;font-weight:400;">(최근 ${logs.length}건)</span></div>`;

      if (logs.length === 0) {
        html += '<div style="color:#64748B;">로그 없음</div>';
      } else {
        const grouped = {};
        logs.forEach(l => {
          const d = (l.timestamp || "").slice(0, 10);
          grouped[d] = grouped[d] || [];
          grouped[d].push(l);
        });
        for (const [date, items] of Object.entries(grouped)) {
          const summary = {};
          items.forEach(l => { summary[l.event] = (summary[l.event] || 0) + 1; });
          const members = new Set(items.filter(l => l.data?.member).map(l => l.data.member));
          const parts = Object.entries(summary).map(([k, v]) => `${k}:${v}`).join("  ");
          html += `<div class="log-row">
            <span class="log-date">${date}</span>
            <span>${parts}</span>
            <span class="log-detail">${members.size > 0 ? members.size + "명" : ""}</span>
          </div>`;
        }
      }
      el.innerHTML = html;
    }

    async function checkGroupEventAlerts() {
      const res = await fetch(`${apiBase()}?action=group-events`);
      const data = await res.json();
      if (!data.ok) return;

      const today = new Date().toLocaleDateString("sv-SE", { timeZone: "Asia/Seoul" });
      const tomorrow = new Date(Date.now() + 86400000).toLocaleDateString("sv-SE", { timeZone: "Asia/Seoul" });

      const alerts = (data.groupEvents || []).filter(e =>
        (e.eventDate === today || e.eventDate === tomorrow) && !e.groupSource
      );
      const banner = document.getElementById("groupAlertBanner");
      if (alerts.length > 0) {
        showGroupAlert(alerts);
      } else if (banner) {
        banner.style.display = "none";
        banner.textContent = "";
      }
    }

    function showGroupAlert(alerts) {
      const banner = document.getElementById("groupAlertBanner");
      if (!banner) return;
      banner.textContent = `⚠️ 오늘/내일 단체 대회 ${alerts.length}건 기록 소스 미입력`;
      banner.style.display = "block";
    }

    async function loadGroupEvents() {
      const res = await fetch(`${apiBase()}?action=group-events`);
      const data = await res.json();
      if (!data.ok) return;

      const events = data.groupEvents || [];
      const container = document.getElementById("groupEventsList");
      if (!container) return;

      if (events.length === 0) {
        container.innerHTML = '<p style="color:#64748b;font-size:14px;">등록된 단체 대회가 없습니다.</p>';
        return;
      }

      container.innerHTML = events.map(e => renderGroupEventCard(e)).join("");
    }

    function renderGroupEventCard(event) {
      const sourceOptions = ["smartchip", "myresult", "spct", "marazone", "ohmyrace", "manual"]
        .map(s => `<option value="${s}" ${event.groupSource && event.groupSource.source === s ? "selected" : ""}>${s}</option>`)
        .join("");

      const statusBadge = {
        pending: '<span style="color:#92400e;background:#fef3c7;padding:2px 6px;border-radius:4px;font-size:12px;">대기중</span>',
        running: '<span style="color:#1e40af;background:#dbeafe;padding:2px 6px;border-radius:4px;font-size:12px;">스크랩중</span>',
        done: '<span style="color:#065f46;background:#d1fae5;padding:2px 6px;border-radius:4px;font-size:12px;">완료</span>',
        partial_failure: '<span style="color:#92400e;background:#fef3c7;padding:2px 6px;border-radius:4px;font-size:12px;">부분실패</span>',
        failed: '<span style="color:#991b1b;background:#fee2e2;padding:2px 6px;border-radius:4px;font-size:12px;">실패</span>',
      }[event.groupScrapeStatus] || '';

      const srcIdVal = event.groupSource ? esc(String(event.groupSource.sourceId || "")) : "";

      return `
    <div class="group-event-card" style="border:1px solid #e2e8f0;border-radius:8px;padding:16px;margin-bottom:12px;background:#1E293B;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px;">
        <strong style="color:#F8FAFC;">${esc(event.eventName || "")}</strong> <span style="color:#94A3B8;font-size:13px;">${esc(event.eventDate || "")}</span>
        ${statusBadge}
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <select id="src-${event.id}" style="padding:4px 8px;border:1px solid #e2e8f0;border-radius:6px;background:#0F172A;color:#E2E8F0;">
          <option value="">소스 선택</option>
          ${sourceOptions}
        </select>
        <input id="srcid-${event.id}" type="text" placeholder="sourceId (예: 202650000099)"
          value="${srcIdVal}"
          style="padding:4px 8px;border:1px solid #e2e8f0;border-radius:6px;width:200px;background:#0F172A;color:#E2E8F0;" />
        <button onclick="saveGroupSource('${event.id.replace(/'/g, "\\'")}')"
          style="padding:4px 12px;background:#3b82f6;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;">
          저장
        </button>
        <button onclick="scrapeGroupEvent('${event.id.replace(/'/g, "\\'")}')" id="scrape-btn-${event.id}"
          ${!event.groupSource?.source ? 'disabled' : ''}
          style="padding:4px 12px;background:${!event.groupSource?.source ? '#64748B' : '#10b981'};color:#fff;border:none;border-radius:6px;cursor:${!event.groupSource?.source ? 'not-allowed' : 'pointer'};font-size:13px;">
          스크랩
        </button>
        ${event.groupScrapeStatus === 'running' ? '<span style="font-size:12px;color:#94A3B8;">스크랩 진행중...</span>' : ''}
      </div>
      <div style="margin-top:6px;font-size:12px;color:#94A3B8;">
        참가자: ${(event.participants || []).length}명
        ${event.groupScrapeJobId ? ' · 잡ID: ' + esc(String(event.groupScrapeJobId)) : ''}
      </div>
    </div>
  `;
    }

    async function saveGroupSource(canonicalEventId) {
      const source = document.getElementById(`src-${canonicalEventId}`).value;
      const sourceId = document.getElementById(`srcid-${canonicalEventId}`).value.trim();

      if (!source || !sourceId) {
        alert("소스와 sourceId를 모두 입력해주세요.");
        return;
      }

      const sourceRes = await fetch(`${apiBase()}?action=group-events`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          subAction: "source",
          ownerPw: getOwnerPw(),
          canonicalEventId,
          source,
          sourceId,
        }),
      });
      const sourceData = await sourceRes.json();
      if (!sourceData.ok) {
        alert("소스 저장 실패: " + (sourceData.error || "알 수 없는 오류"));
        return;
      }

      alert("소스 저장 완료. 스크랩 버튼을 눌러 기록을 수집하세요.");
      
      // 스크랩 버튼 활성화
      const scrapeBtn = document.getElementById(`scrape-btn-${canonicalEventId}`);
      if (scrapeBtn) {
        scrapeBtn.disabled = false;
        scrapeBtn.style.background = "#10b981";
        scrapeBtn.style.cursor = "pointer";
      }
      
      await loadGroupEvents();
    }

    async function scrapeGroupEvent(canonicalEventId) {
      try {
        const scrapeRes = await fetch(`${apiBase()}?action=group-events`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            subAction: "scrape",
            ownerPw: getOwnerPw(),
            canonicalEventId,
          }),
        });
        const scrapeData = await scrapeRes.json();
        if (scrapeData.ok) {
          alert("스크랩이 시작되었습니다. 잠시 후 새로고침하세요.");
          await loadGroupEvents();
        } else {
          alert("스크랩 실패: " + (scrapeData.error || "알 수 없는 오류"));
        }
      } catch (err) {
        console.error("스크랩 오류:", err);
        alert("스크랩 중 오류 발생");
      }
    }

    function initOps() {
      loadAll();
    }

    document.getElementById("authPw").addEventListener("keydown", (e) => {
      if (e.key === "Enter") tryAuth();
    });

    if (!sessionStorage.getItem(OPS_AUTH_KEY)) {
      document.getElementById("authOverlay").style.display = "flex";
    } else {
      document.getElementById("authOverlay").style.display = "none";
      initOps();
    }
  </script>
</body>
</html>
