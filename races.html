<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>대회 기록 - 동탄 마라톤 클럽</title>
  <link rel="icon" href="assets/dmc_logo.png" />
  <style>
    :root {
      --color-primary: #2563EB;
      --color-primary-hover: #1D4ED8;
      --color-primary-light: #DBEAFE;
      --color-bg: #F8FAFC;
      --color-card: #FFFFFF;
      --color-text: #0F172A;
      --color-text-secondary: #64748B;
      --color-text-muted: #94A3B8;
      --color-border: #E2E8F0;
      --color-border-light: #F1F5F9;
      --color-success: #059669;
      --color-error: #DC2626;
      --color-gold: #F59E0B;
      --color-silver: #9CA3AF;
      --color-bronze: #D97706;
    }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; margin:0; background: var(--color-bg); color: var(--color-text); }
    .wrap { max-width: 640px; margin: 0 auto; padding: 16px; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand img { width: 32px; height: 32px; border-radius: 8px; }
    .brand h1 { margin: 0; font-size: 18px; }
    .nav-link { font-size: 13px; color: var(--color-primary); text-decoration: none; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--color-primary); transition: all 0.15s; }
    .nav-link:hover { background: var(--color-primary); color: #fff; }

    /* Cards */
    .card { background: var(--color-card); border-radius: 14px; padding: 14px; box-shadow: 0 2px 12px rgba(15,23,42,0.08); margin-bottom: 12px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 12px; background: var(--color-card); border-radius: 12px; padding: 4px; box-shadow: 0 1px 4px rgba(15,23,42,0.06); }
    .tab { flex: 1; padding: 10px 8px; border: none; background: transparent; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--color-text-secondary); transition: all 0.2s; }
    .tab:hover { color: var(--color-text); }
    .tab.active { background: var(--color-primary); color: #fff; box-shadow: 0 2px 8px rgba(37,99,235,0.3); }

    /* Distance filter pills */
    .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .filter-pill { padding: 6px 14px; border-radius: 999px; border: 1px solid var(--color-border); background: var(--color-card); font-size: 13px; cursor: pointer; color: var(--color-text-secondary); transition: all 0.15s; white-space: nowrap; }
    .filter-pill:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .filter-pill.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }

    /* Stats bar */
    .stats-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .stat-item { flex: 1; min-width: 100px; background: var(--color-card); border-radius: 12px; padding: 12px; text-align: center; box-shadow: 0 1px 4px rgba(15,23,42,0.06); }
    .stat-value { font-size: 24px; font-weight: 700; color: var(--color-primary); }
    .stat-label { font-size: 11px; color: var(--color-text-muted); margin-top: 2px; }

    /* PB Ranking table */
    .ranking-list { list-style: none; padding: 0; margin: 0; }
    .ranking-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--color-border-light); }
    .ranking-item:last-child { border-bottom: none; }
    .rank-badge { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
    .rank-1 { background: linear-gradient(135deg, #FEF3C7, #FDE68A); color: #92400E; border: 2px solid var(--color-gold); }
    .rank-2 { background: linear-gradient(135deg, #F3F4F6, #E5E7EB); color: #4B5563; border: 2px solid var(--color-silver); }
    .rank-3 { background: linear-gradient(135deg, #FEF3C7, #FDE68A); color: #92400E; border: 2px solid var(--color-bronze); }
    .rank-other { background: var(--color-border-light); color: var(--color-text-secondary); border: 2px solid transparent; }
    .ranking-info { flex: 1; min-width: 0; }
    .ranking-name { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .ranking-detail { font-size: 12px; color: var(--color-text-muted); margin-top: 2px; }
    .ranking-time { font-size: 18px; font-weight: 700; color: var(--color-text); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .pb-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; background: #FEF3C7; color: #92400E; }

    /* Team pill */
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; border: 1px solid transparent; }

    /* Distance badge */
    .dist-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
    .dist-5K { background: #D1FAE5; color: #065F46; }
    .dist-10K { background: #DBEAFE; color: #1E40AF; }
    .dist-30K { background: #CCFBF1; color: #0F766E; }
    .dist-half { background: #EDE9FE; color: #5B21B6; }
    .dist-full { background: #FEE2E2; color: #991B1B; }
    .dist-ultra { background: #1F2937; color: #F9FAFB; }
    .dist-3K { background: #E0F2FE; color: #0369A1; }
    .dist-unknown { background: #F1F5F9; color: #475569; }

    /* Race cards */
    .race-card { margin-bottom: 10px; }
    .race-header { cursor: pointer; padding: 14px; transition: background 0.15s; border-radius: 12px; }
    .race-header:hover { background: var(--color-border-light); }
    .race-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .race-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 12px; color: var(--color-text-muted); }
    .race-meta .dot { color: var(--color-border); }
    .race-count { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: var(--color-primary-light); color: var(--color-primary); border-radius: 999px; font-size: 11px; font-weight: 600; }
    .race-results { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
    .race-card.open .race-results { max-height: 20000px; }
    .race-chevron { display: inline-block; transition: transform 0.2s; font-size: 12px; color: var(--color-text-muted); }
    .race-card.open .race-chevron { transform: rotate(180deg); }
    .result-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-top: 1px solid var(--color-border-light); }
    .result-rank { width: 28px; text-align: center; font-size: 13px; font-weight: 600; color: var(--color-text-muted); }
    .result-info { flex: 1; min-width: 0; }
    .result-name { font-size: 14px; font-weight: 500; }
    .result-sub { font-size: 11px; color: var(--color-text-muted); margin-top: 1px; }
    .result-time { font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums; }

    /* Individual view */
    .member-select-wrap { margin-bottom: 14px; }
    .member-select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--color-border); font-size: 14px; background: var(--color-card); color: var(--color-text); }
    .member-select:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px var(--color-primary-light); }
    .member-stats { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .member-stat { padding: 8px 14px; background: var(--color-border-light); border-radius: 10px; font-size: 13px; color: var(--color-text-secondary); }
    .member-stat strong { color: var(--color-text); }
    .timeline { position: relative; padding-left: 20px; }
    .timeline::before { content: ""; position: absolute; left: 6px; top: 8px; bottom: 8px; width: 2px; background: var(--color-border); border-radius: 2px; }
    .timeline-item { position: relative; margin-bottom: 16px; }
    .timeline-item:last-child { margin-bottom: 0; }
    .timeline-dot { position: absolute; left: -17px; top: 6px; width: 10px; height: 10px; border-radius: 50%; background: var(--color-border); border: 2px solid var(--color-card); }
    .timeline-item.is-pb .timeline-dot { background: var(--color-gold); }
    .timeline-date { font-size: 12px; color: var(--color-text-muted); margin-bottom: 2px; }
    .timeline-content { background: var(--color-border-light); border-radius: 10px; padding: 10px 14px; }
    .timeline-race { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .timeline-result { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .timeline-time { font-weight: 600; font-variant-numeric: tabular-nums; }

    /* Source badge */
    .source-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 500; text-transform: uppercase; background: var(--color-border-light); color: var(--color-text-muted); }

    /* External link */
    .ext-link { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 5px; font-size: 11px; color: var(--color-primary); background: #EFF6FF; text-decoration: none; white-space: nowrap; transition: background 0.15s; }
    .ext-link:hover { background: #DBEAFE; }
    .ext-link svg { width: 11px; height: 11px; flex-shrink: 0; }

    /* Empty state */
    .empty { text-align: center; padding: 32px 16px; color: var(--color-text-muted); font-size: 14px; }
    .empty-icon { font-size: 40px; margin-bottom: 8px; display: block; }

    /* Loading skeleton */
    .skeleton { position: relative; overflow: hidden; background: var(--color-border); border-radius: 8px; }
    .skeleton::after { content: ""; position: absolute; top: 0; left: -60%; width: 60%; height: 100%; background: linear-gradient(90deg, rgba(226,232,240,0), rgba(255,255,255,0.8), rgba(226,232,240,0)); animation: shimmer 1.2s infinite; }
    .skeleton-line { height: 14px; margin: 8px 0; }
    @keyframes shimmer { to { transform: translateX(260%); } }

    /* Gender filter */
    .sub-filters { display: flex; gap: 4px; margin-bottom: 12px; }
    .sub-filter { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--color-border); background: transparent; font-size: 12px; cursor: pointer; color: var(--color-text-muted); transition: all 0.15s; }
    .sub-filter.active { background: var(--color-text); color: #fff; border-color: var(--color-text); }

    /* Period / month selector */
    .year-group { margin-bottom: 14px; }
    .year-group-label { font-size: 12px; font-weight: 700; color: var(--color-text-muted); margin-bottom: 8px; letter-spacing: 0.5px; }
    .month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .month-btn { padding: 10px 4px; border: 1.5px solid var(--color-border); border-radius: 10px; background: #fff; cursor: pointer; text-align: center; font-size: 13px; font-weight: 600; color: var(--color-text); transition: all 0.15s; }
    .month-btn:hover:not(:disabled) { border-color: var(--color-primary); background: #EFF6FF; }
    .month-btn.selected { border-color: var(--color-primary); background: var(--color-primary); color: #fff; }
    .month-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Search flow */
    .search-trigger { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 14px; }
    .btn { padding: 10px 18px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--color-primary); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--color-primary-hover); }
    .btn-outline { background: transparent; border: 1px solid var(--color-border); color: var(--color-text-secondary); }
    .btn-outline:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn-success { background: var(--color-success); color: #fff; }
    .btn-success:hover:not(:disabled) { background: #047857; }

    .search-panel { margin-top: 14px; }
    .search-panel .card { border: 1px solid var(--color-primary); border-left: 4px solid var(--color-primary); }
    .search-section-title { font-size: 15px; font-weight: 600; margin: 0 0 10px; display: flex; align-items: center; gap: 8px; }
    .search-section-title small { font-weight: 400; color: var(--color-text-muted); font-size: 12px; }
    .event-search-bar { display: flex; gap: 6px; margin-bottom: 10px; }
    .event-search-bar input { flex: 1; padding: 8px 12px; border: 1px solid var(--color-border); border-radius: 8px; font-size: 13px; outline: none; }
    .event-search-bar input:focus { border-color: var(--color-primary); }
    .event-search-bar select { padding: 8px 10px; border: 1px solid var(--color-border); border-radius: 8px; font-size: 13px; background: #fff; }
    .event-list-actions { display: flex; gap: 8px; margin-bottom: 8px; font-size: 12px; }
    .event-list-actions a { color: var(--color-primary); cursor: pointer; text-decoration: underline; }
    .event-list { max-height: 320px; overflow-y: auto; border: 1px solid var(--color-border-light); border-radius: 8px; }
    .event-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-bottom: 1px solid var(--color-border-light); font-size: 13px; cursor: pointer; transition: background 0.1s; }
    .event-item:last-child { border-bottom: none; }
    .event-item:hover { background: var(--color-primary-light); }
    .event-item input[type=checkbox] { flex-shrink: 0; width: 16px; height: 16px; accent-color: var(--color-primary); }
    .event-item-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .event-item-date { color: var(--color-text-muted); font-size: 12px; white-space: nowrap; }
    .event-item-badge { padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 500; white-space: nowrap; }
    .event-badge-done { background: #D1FAE5; color: #065F46; }
    .event-badge-source { background: var(--color-border-light); color: var(--color-text-muted); text-transform: uppercase; }
    .event-counter { font-size: 12px; color: var(--color-text-muted); text-align: right; margin-top: 6px; }

    .progress-bar-wrap { margin: 12px 0; }
    .progress-bar-bg { height: 6px; background: var(--color-border-light); border-radius: 4px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--color-primary); border-radius: 4px; transition: width 0.3s; }
    .progress-text { font-size: 12px; color: var(--color-text-muted); margin-top: 4px; }
    .progress-detail { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }

    .found-result-card { border: 1px solid var(--color-border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
    .found-result-card.selected { border-color: var(--color-primary); background: #EFF6FF; }
    .found-result-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; }
    .found-result-header input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--color-primary); }
    .found-event-name { font-weight: 600; font-size: 14px; flex: 1; }
    .found-event-date { font-size: 12px; color: var(--color-text-muted); }
    .found-records { padding-left: 24px; }
    .found-record-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; }
    .found-record-time { font-weight: 600; font-variant-numeric: tabular-nums; }

    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1E293B; color: #fff; padding: 12px 24px; border-radius: 12px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }

    @media (max-width: 480px) {
      .ranking-time { font-size: 16px; }
      .stat-value { font-size: 20px; }
      .tab { font-size: 13px; padding: 9px 6px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Header -->
    <div class="header">
      <div class="brand">
        <img alt="동탄마라톤클럽 로고" src="assets/dmc_logo.png" />
        <h1>대회 기록 <span style="font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;background:#DBEAFE;color:#1E40AF;vertical-align:middle">BETA</span></h1>
      </div>
      <div style="display:flex; gap:6px;">
        <a href="my.html" class="nav-link">내 기록</a>
        <a href="index.html" class="nav-link">출석체크</a>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-item">
        <div class="stat-value" id="statMembers">-</div>
        <div class="stat-label">참가 회원</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statRaces">-</div>
        <div class="stat-label">대회 수</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statRecords">-</div>
        <div class="stat-label">총 기록 수</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="pb">최고 기록</button>
      <button class="tab" data-tab="races">대회별 기록</button>
      <button class="tab" data-tab="individual">개인 기록</button>
    </div>

    <!-- Distance Filter -->
    <div class="filters" id="distFilter">
      <button class="filter-pill active" data-dist="all">전체</button>
      <button class="filter-pill" data-dist="5K">5K</button>
      <button class="filter-pill" data-dist="10K">10K</button>
      <button class="filter-pill" data-dist="half">하프</button>
      <button class="filter-pill" data-dist="full">풀</button>
      <button class="filter-pill" data-dist="ultra">울트라</button>
    </div>

    <!-- Gender filter -->
    <div class="sub-filters" id="genderFilter">
      <button class="sub-filter active" data-gender="all">전체</button>
      <button class="sub-filter" data-gender="M">남자</button>
      <button class="sub-filter" data-gender="F">여자</button>
    </div>

    <!-- Content -->
    <div id="content"></div>
  </div>

  <div class="toast" id="toast"></div>

<script src="race-distance-client.js"></script>
<script>
const TEAM_COLORS = {
  "S팀":  { bg: "#ffe8d9", text: "#8a3d00", border: "#ffd0b3" },
  "1팀": { bg: "#e6f1ff", text: "#124e8a", border: "#c7ddff" },
  "2팀": { bg: "#e9f7ee", text: "#1f6b3a", border: "#cfeedd" },
  "3팀": { bg: "#f3e8ff", text: "#5a2b8a", border: "#e2d1ff" },
  "4팀": { bg: "#fff5cc", text: "#7a5b00", border: "#ffe8a3" },
  "5팀": { bg: "#ffe7f1", text: "#8a2353", border: "#ffd0e2" }
};
const TEAM_LABELS = { S: "S팀", T1: "1팀", T2: "2팀", T3: "3팀", T4: "4팀", T5: "5팀" };
const DIST_LABELS = { "5K": "5K", "3K": "3K", "10K": "10K", "30K": "30K", "half": "하프", "full": "풀", "ultra": "울트라", unknown: "?" };
const DIST_ORDER = ["full", "half", "10K", "30K", "5K", "3K", "ultra"];
const DIST_SORT_ORDER = { full: 0, half: 1, "10K": 2, "30K": 3, "5K": 4, "3K": 5, ultra: -1, unknown: 100 };

function sortResults(a, b) {
  const distA = DIST_SORT_ORDER[a.distance] ?? 99;
  const distB = DIST_SORT_ORDER[b.distance] ?? 99;
  if (distA !== distB) return distA - distB;
  const timeA = timeToSeconds(a.netTime);
  const timeB = timeToSeconds(b.netTime);
  if (timeA !== timeB) return timeA - timeB;
  const pbA = a.isPB ? 0 : 1;
  const pbB = b.isPB ? 0 : 1;
  if (pbA !== pbB) return pbA - pbB;
  const bibA = parseInt(a.bib || "99999");
  const bibB = parseInt(b.bib || "99999");
  return bibA - bibB;
}

let membersData = [];
let racesData = [];
let memberMap = {};
let currentTab = "pb";
let currentDist = "all";
let currentGender = "all";

function esc(s) {
  return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
}

function timeToSeconds(t) {
  if (!t) return Infinity;
  const parts = t.split(":").map(Number);
  if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
  if (parts.length === 2) return parts[0] * 60 + parts[1];
  return Infinity;
}

function calcPace(netTime, distance) {
  const DIST_KM = { full: 42.195, half: 21.0975, "10K": 10, "5K": 5, "3K": 3, "21K": 21.0975, "42K": 42.195, "30K": 30, "32K": 32, "100K": 100, "6.5K": 6.5 };
  const km = DIST_KM[distance];
  if (!km) return "";
  const secs = timeToSeconds(netTime);
  if (!secs || secs === Infinity) return "";
  const paceSecPerKm = secs / km;
  const paceMin = Math.floor(paceSecPerKm / 60);
  const paceSec = Math.round(paceSecPerKm % 60);
  return `${paceMin}'${String(paceSec).padStart(2, "0")}"`;
}

function formatDate(d) {
  if (!d) return "";
  const [y, m, day] = d.split("-");
  return `${y}.${m}.${day}`;
}

function teamPill(teamCode) {
  if (!teamCode) return "";
  const label = TEAM_LABELS[teamCode] || teamCode;
  const c = TEAM_COLORS[label];
  if (!c) return "";
  return `<span class="pill" style="background:${c.bg};color:${c.text};border-color:${c.border}">${esc(label)}</span>`;
}

function buildTimingSiteUrl(source, sourceId, realName) {
  if (!source || !sourceId || source === "manual") return null;
  switch (source) {
    case "spct": {
      const year = sourceId.substring(0, 4);
      return realName
        ? `https://time.spct.kr/m1.php?TargetYear=${year}&EVENT_NO=${sourceId}&currentPage=1&searchResultsName=${encodeURIComponent(realName)}`
        : `https://time.spct.kr/m1.php?TargetYear=${year}&EVENT_NO=${sourceId}&currentPage=1`;
    }
    case "smartchip":
      return `https://www.smartchip.co.kr/Search_Ballyno.html?usedata=${sourceId}`;
    case "myresult":
      return `https://myresult.co.kr/${sourceId}`;
    case "marazone":
      return `https://raceresult.co.kr`;
    default:
      return null;
  }
}

function extLinkHtml(source, sourceId, realName) {
  const url = buildTimingSiteUrl(source, sourceId, realName);
  if (!url) return "";
  const svg = '<svg viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z"/><path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z"/></svg>';
  return `<a href="${esc(url)}" target="_blank" rel="noopener" class="ext-link" title="기록 사이트에서 보기" onclick="event.stopPropagation()">${esc(source)}${svg}</a>`;
}

function distBadge(dist) {
  const label = DIST_LABELS[dist] || dist;
  const safeCls = String(dist).replace(/[^a-zA-Z0-9_-]/g, "_") || "unknown";
  const cls = `dist-${safeCls}`;
  return `<span class="dist-badge ${cls}">${esc(label)}</span>`;
}

function enrichResults() {
  const allResults = [];
  for (const race of racesData) {
    for (const r of race.results) {
      const member = memberMap[r.realName];
      const distNorm =
        typeof normalizeRaceDistance === "function" ? normalizeRaceDistance(r.distance) : r.distance;
      allResults.push({
        ...r,
        distance: distNorm,
        gender: member?.gender || r.gender || "",
        nickname: member?.nickname || r.nickname || r.realName,
        team: member?.team || "",
        isGuest: !member,
        raceName: race.name,
        raceDate: race.date,
        raceId: race.id,
        raceLocation: race.location,
        source: race.source,
        sourceId: race.sourceId
      });
    }
  }
  return allResults;
}

function computePBs(allResults) {
  const pbs = {};
  for (const r of allResults) {
    const key = `${r.realName}||${r.distance}`;
    const sec = timeToSeconds(r.netTime);
    if (!pbs[key] || sec < timeToSeconds(pbs[key].netTime)) {
      pbs[key] = { ...r };
    }
  }
  return Object.values(pbs);
}

function filterResults(results) {
  return results.filter(r => {
    if (currentDist !== "all" && r.distance !== currentDist) return false;
    if (currentGender !== "all" && r.gender !== currentGender) return false;
    return true;
  });
}

        <div style="font-size:22px;font-weight:800;color:#2563EB">${raceSet.size}</div>
        <div style="font-size:11px;color:var(--color-text-muted);margin-top:2px">대회</div>
      </div>
      <div style="text-align:center;padding:10px 6px;background:#F0FDF4;border-radius:12px">
        <div style="font-size:22px;font-weight:800;color:#16A34A">${memberSet.size}</div>
        <div style="font-size:11px;color:var(--color-text-muted);margin-top:2px">참가 회원</div>
      </div>
      <div style="text-align:center;padding:10px 6px;background:#FFF7ED;border-radius:12px">
        <div style="font-size:22px;font-weight:800;color:#EA580C">${pbCount}</div>
        <div style="font-size:11px;color:var(--color-text-muted);margin-top:2px">PB 달성</div>

    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">
      <div style="padding:10px 12px;background:#F8FAFC;border-radius:12px;display:flex;align-items:center;gap:8px">
        <span style="font-size:20px">🏃</span>
        <div>
          <div style="font-size:13px;font-weight:700">${(totalKm / 1000).toFixed(1)}천 km</div>
          <div style="font-size:11px;color:var(--color-text-muted)">총 달린 거리</div>
        </div>
      </div>
      <div style="padding:10px 12px;background:#F8FAFC;border-radius:12px;display:flex;align-items:center;gap:8px">
        <span style="font-size:20px">⚡</span>
        <div>
          <div style="font-size:13px;font-weight:700">서브3 ${sub3.length}명</div>
          <div style="font-size:11px;color:var(--color-text-muted)">풀코스 3시간 이내</div>
        </div>
      </div>
      ${topActive ? `<div style="padding:10px 12px;background:#F8FAFC;border-radius:12px;display:flex;align-items:center;gap:8px;grid-column:span 2">
        <span style="font-size:20px">🔥</span>
        <div>
          <div style="font-size:13px;font-weight:700">${esc(topActive[0])} · ${topActive[1].size}개 대회 출전</div>
          <div style="font-size:11px;color:var(--color-text-muted)">최다 출전 회원</div>
        </div>
      </div>` : ""}
    </div>
  </div>`;
}

function renderPBTab() {
  const all = enrichResults();
  const pbs = computePBs(all);
  const filtered = filterResults(pbs);

  if (currentDist === "all") {
    let html = "";
    for (const dist of DIST_ORDER) {
      const distPbs = filtered.filter(r => r.distance === dist).sort((a, b) => timeToSeconds(a.netTime) - timeToSeconds(b.netTime));
      if (!distPbs.length) continue;
      html += `<div class="card"><h3 style="margin:0 0 10px;font-size:15px;">${distBadge(dist)} 최고 기록</h3>`;
      html += renderRankingList(distPbs);
      html += `</div>`;
    }
    if (!html) html = emptyState("등록된 기록이 없습니다.");
    document.getElementById("content").innerHTML = html;
  } else {
    const distPbs = filtered.sort((a, b) => timeToSeconds(a.netTime) - timeToSeconds(b.netTime));
    if (!distPbs.length) {
      document.getElementById("content").innerHTML = emptyState("해당 거리의 기록이 없습니다.");
      return;
    }
    document.getElementById("content").innerHTML = `<div class="card">${renderRankingList(distPbs)}</div>`;
  }
}

function renderRankingList(items) {
  let html = '<ul class="ranking-list">';
  items.forEach((r, i) => {
    const rank = i + 1;
    const rankCls = rank <= 3 ? `rank-${rank}` : "rank-other";
    const medal = rank === 1 ? "🥇" : rank === 2 ? "🥈" : rank === 3 ? "🥉" : rank;
    html += `
      <li class="ranking-item">
        <div class="rank-badge ${rankCls}">${medal}</div>
        <div class="ranking-info">
          <div class="ranking-name">${esc(r.nickname)} ${r.isGuest ? '<span class="pill" style="background:#FEF3C7;color:#92400E;border-color:#FDE68A;font-size:10px">게스트</span>' : teamPill(r.team)}</div>
          <div class="ranking-detail">${esc(r.raceName)} · ${formatDate(r.raceDate)} ${r.note ? `<span class="pb-badge" style="background:#E0E7FF;color:#3730A3">${esc(r.note)}</span>` : ""}</div>
        </div>
        <div style="text-align:right">
          <div class="ranking-time">${esc(r.netTime)}</div>
          ${calcPace(r.netTime, r.distance) ? `<div style="font-size:11px;color:var(--color-text-muted);margin-top:2px">${calcPace(r.netTime, r.distance)}/km</div>` : ""}
        </div>
      </li>`;
  });
  html += "</ul>";
  return html;
}

function renderRacesTab() {
  const el = document.getElementById("content");
  const sortedRaces = [...racesData].sort((a, b) => b.date.localeCompare(a.date));

    el.innerHTML = emptyState("등록된 대회가 없습니다.");

      .filter(r => {

    const distances = [...new Set(results.map(r => r.distance))];

      <div class="card race-card" id="race-${esc(race.id)}">

const MAX_MONTH_SELECT = 5;
function buildMonthOptions() {
  const now = new Date();
  const months = [];
  for (let m = now.getMonth() + 1; m >= 1; m--) {
    months.push({ year: 2026, month: m, id: `2026-${String(m).padStart(2,"0")}` });
  }
  for (let m = 12; m >= 1; m--) {
    months.push({ year: 2025, month: m, id: `2025-${String(m).padStart(2,"0")}` });
  }
  return months;
}
const MONTH_OPTIONS = buildMonthOptions();
const MONTH_LABELS = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

let searchState = { step: "idle", selectedMonths: new Set(), jobId: null, pollTimer: null, selectedEvents: new Set(), allEvents: [], foundResults: [], selectedResults: new Map() };

        ${guestNames.length ? '<option disabled>──── 게스트 ────</option>' : ""}

  if (searchState.pollTimer) clearInterval(searchState.pollTimer);
  searchState = { step: "idle", selectedMonths: new Set(), jobId: null, pollTimer: null, selectedEvents: new Set(), allEvents: [], foundResults: [], selectedResults: new Map() };

function renderMemberDetail() {
  const el = document.getElementById("memberDetail");
  const name = document.getElementById("memberSelect").value;
  if (!name) { el.innerHTML = emptyState("닉네임을 선택하면 기록이 표시됩니다."); return; }

  const all = enrichResults().filter(r => r.realName === name);
  const member = memberMap[name] || {};
  const nickname = member.nickname || name;

  let html = "";

  if (all.length) {
    const filtered = filterResults(all).sort((a, b) => {
      const dateCmp = (b.raceDate || "").localeCompare(a.raceDate || "");
      if (dateCmp !== 0) return dateCmp;
      return sortResults(a, b);
    });

    const pbs = computePBs(all);
    const pbSet = new Set(pbs.map(p => `${p.raceId}||${p.distance}||${p.netTime}`));
    const totalRaces = new Set(filtered.map(r => r.raceId)).size;
    const distances = [...new Set(filtered.map(r => r.distance))];
    const pbCount = pbs.filter(p => {
      if (currentDist !== "all" && p.distance !== currentDist) return false;
      if (currentGender !== "all" && p.gender !== currentGender) return false;
      return true;
    }).length;

    html += `
      <div class="member-stats">
        <div class="member-stat"><strong>${totalRaces}</strong>개 대회</div>
        <div class="member-stat"><strong>${distances.length}</strong>개 거리</div>
        <div class="member-stat"><strong>${pbCount}</strong>개 PB</div>
      </div>`;

    if (filtered.length) {
      html += '<div class="timeline">';
      for (const r of filtered) {
        const isPb = pbSet.has(`${r.raceId}||${r.distance}||${r.netTime}`);
        html += `
          <div class="timeline-item ${isPb ? "is-pb" : ""}">
            <div class="timeline-dot"></div>
            <div class="timeline-date">${formatDate(r.raceDate)}</div>
            <div class="timeline-content">
              <div class="timeline-race">${esc(r.raceName)}</div>
              <div class="timeline-result">
                ${distBadge(r.distance)}
                <span class="timeline-time">${esc(r.netTime)}</span>
                ${calcPace(r.netTime, r.distance) ? `<span style="font-size:11px;color:var(--color-text-muted)">${calcPace(r.netTime, r.distance)}/km</span>` : ""}
                ${isPb || r.isPB ? '<span class="pb-badge">PB</span>' : ""}
                ${r.note ? `<span class="pb-badge" style="background:#E0E7FF;color:#3730A3">${esc(r.note)}</span>` : ""}

      html += emptyState("선택한 조건에 맞는 기록이 없습니다.");
    }
  } else {
    html += emptyState("해당 회원의 기록이 없습니다.");
  }

  html += `
    <div class="search-trigger">
      <a href="my.html" class="btn btn-outline" style="text-decoration:none;">🔍 내 기록에서 검색하기 →</a>
    </div>`;

  el.innerHTML = html;
}

function showToast(msg, duration = 2000) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), duration);
}

function startSearchFlow() {
  renderMonthSelector();
}

function renderMonthSelector() {
  const sp = document.getElementById("searchPanel");
  searchState.step = "select-period";
  const selCount = searchState.selectedMonths.size;

  const by2026 = MONTH_OPTIONS.filter(m => m.year === 2026);
  const by2025 = MONTH_OPTIONS.filter(m => m.year === 2025);

  function monthGrid(months) {
    return `<div class="month-grid">
      ${months.map(m => {
        const isSel = searchState.selectedMonths.has(m.id);
        const isDisabled = !isSel && selCount >= MAX_MONTH_SELECT;
        return `<button class="month-btn ${isSel ? "selected" : ""}" ${isDisabled ? "disabled" : ""} onclick="toggleMonth('${m.id}')">${MONTH_LABELS[m.month-1]}</button>`;
      }).join("")}
    </div>`;
  }

  sp.innerHTML = `<div class="search-panel"><div class="card">
    <p class="search-section-title">검색할 월 선택 <small>최대 ${MAX_MONTH_SELECT}개</small></p>
    <p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 12px">참가한 대회가 있는 달을 선택하세요.</p>
    ${by2026.length ? `<div class="year-group"><div class="year-group-label">2026</div>${monthGrid(by2026)}</div>` : ""}
    <div class="year-group"><div class="year-group-label">2025</div>${monthGrid(by2025)}</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">

        ${selCount}개 선택됨 (최대 ${MAX_MONTH_SELECT}개)
      </span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="resetSearch()">취소</button>
        <button class="btn btn-primary btn-sm" ${selCount === 0 ? "disabled" : ""} onclick="loadEventsForMonths()">대회 불러오기</button>
      </div>
    </div>
  </div></div>`;
}

function toggleMonth(monthId) {
  if (searchState.selectedMonths.has(monthId)) {
    searchState.selectedMonths.delete(monthId);
  } else {
    if (searchState.selectedMonths.size >= MAX_MONTH_SELECT) return;
    searchState.selectedMonths.add(monthId);
  }
  renderMonthSelector();
}

async function loadEventsForMonths() {
  const months = [...searchState.selectedMonths].sort();
  if (!months.length) return;

  const years = [...new Set(months.map(m => parseInt(m.split("-")[0])))];
  const sp = document.getElementById("searchPanel");
  searchState.step = "loading-events";

  const label = months.map(m => {
    const [y, mo] = m.split("-");
    return `${y}.${MONTH_LABELS[parseInt(mo)-1]}`;
  }).join(", ");

  sp.innerHTML = `<div class="search-panel"><div class="card">
    <p class="search-section-title">${esc(label)} 대회 목록 불러오는 중...</p>
    <div class="progress-bar-wrap"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:30%;animation:shimmer 1.2s infinite"></div></div></div>
  </div></div>`;

  try {
    const results = await Promise.all(years.map(y => fetch(`${RACE_API}?action=discover-all&year=${y}`).then(r => r.json())));
    const allRaw = results.flatMap(d => d.events || []);

    searchState.allEvents = allRaw
      .map(e => ({ ...e, eventName: e.name || e.eventName || e.sourceId, eventDate: e.date || e.eventDate || "" }))
      .filter(e => {
        if (!e.eventDate) return false;
        const ym = e.eventDate.substring(0, 7);
        return months.includes(ym);
      });

    searchState.step = "select-events";
    renderEventSelector();
  } catch (e) {
    sp.innerHTML = `<div class="search-panel"><div class="card">
      <div class="empty"><span class="empty-icon">⚠️</span>대회 목록을 불러오지 못했습니다.<br><small style="color:var(--color-text-muted)">${esc(e.message)}</small></div>
    </div></div>`;
  }
}

  const sp = document.getElementById("searchPanel");
  const name = document.getElementById("memberSelect").value;
  const member = memberMap[name] || {};
  const query = document.getElementById("eventSearchQ")?.value || "";

  let events = searchState.allEvents;
  if (query) {
    const q = query.toLowerCase();
    events = events.filter(e => (e.eventName || "").toLowerCase().includes(q) || (e.sourceId || "").toLowerCase().includes(q));
  }
  if (sourceFilter !== "all") {
    events = events.filter(e => e.source === sourceFilter);
  }

  const sources = [...new Set(searchState.allEvents.map(e => e.source))].sort();
  const selCount = searchState.selectedEvents.size;

  sp.innerHTML = `<div class="search-panel"><div class="card">
    <p class="search-section-title">검색할 대회 선택 <small>${[...searchState.selectedMonths].sort().map(m => { const [y,mo]=m.split("-"); return `${y}.${MONTH_LABELS[parseInt(mo)-1]}`; }).join(", ")} · ${esc(member.nickname || name)}님</small></p>
    <div class="event-search-bar">
      <input type="text" id="eventSearchQ" placeholder="대회명 검색" value="${esc(query)}" oninput="renderEventSelector()" />
      <select id="eventSourceFilter" onchange="renderEventSelector()">
        <option value="all">전체 사이트</option>
        ${sources.map(s => `<option value="${esc(s)}" ${sourceFilter === s ? "selected" : ""}>${esc(s)}</option>`).join("")}
      </select>
    </div>
    <div class="event-list-actions">
      <a onclick="toggleAllEvents(true)">전체 선택</a>
      <a onclick="toggleAllEvents(false)">전체 해제</a>
    </div>
    <div class="event-list" id="eventListContainer">
      ${events.map((e, i) => {
        const key = `${e.source}:${e.sourceId}`;
        const checked = searchState.selectedEvents.has(key);
        const doneLabel = e.alreadyInSystem ? (e.jobStatus === "confirmed" ? "입력완료" : "스크랩됨") : "";
        return `<label class="event-item">
          <input type="checkbox" ${checked ? "checked" : ""} onchange="toggleEvent('${esc(key)}', this.checked)" />
          <span class="event-item-name">${esc(e.eventName)}</span>
          ${e.eventDate ? `<span class="event-item-date">${esc(e.eventDate)}</span>` : ""}
          ${doneLabel ? `<span class="event-item-badge event-badge-done">${doneLabel}</span>` : ""}
          <span class="event-item-badge event-badge-source">${esc(e.source)}</span>
        </label>`;
      }).join("")}
      ${!events.length ? '<div style="padding:20px;text-align:center;color:var(--color-text-muted);font-size:13px">해당 조건의 대회가 없습니다</div>' : ""}
    </div>
    <div class="event-counter">${events.length}개 대회 중 <strong>${selCount}개</strong> 선택됨</div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
      <button class="btn btn-outline btn-sm" onclick="resetSearch()">취소</button>
      <button class="btn btn-primary btn-sm" ${selCount === 0 ? "disabled" : ""} onclick="beginSearch()">검색 시작 (${selCount}개)</button>
    </div>
  </div></div>`;
}

function toggleEvent(key, checked) {
  if (checked) searchState.selectedEvents.add(key);
  else searchState.selectedEvents.delete(key);
  updateEventCounter();
}

function updateEventCounter() {
  const selCount = searchState.selectedEvents.size;
  const counter = document.querySelector(".event-counter");
  if (counter) counter.innerHTML = `${searchState.allEvents.length}개 대회 중 <strong>${selCount}개</strong> 선택됨`;
  const btn = document.querySelector(".search-panel .btn-primary");
  if (btn) { btn.disabled = selCount === 0; btn.textContent = `검색 시작 (${selCount}개)`; }
}

function toggleAllEvents(selectAll) {
  const query = document.getElementById("eventSearchQ")?.value || "";
  const sourceFilter = document.getElementById("eventSourceFilter")?.value || "all";
  let events = searchState.allEvents;
  if (query) {
    const q = query.toLowerCase();
    events = events.filter(e => (e.eventName || "").toLowerCase().includes(q) || (e.sourceId || "").toLowerCase().includes(q));
  }
  if (sourceFilter !== "all") events = events.filter(e => e.source === sourceFilter);

  for (const e of events) {
    const key = `${e.source}:${e.sourceId}`;
    if (selectAll) searchState.selectedEvents.add(key);
    else searchState.selectedEvents.delete(key);
  }
  const container = document.getElementById("eventListContainer");
  if (container) {
    container.querySelectorAll("input[type=checkbox]").forEach(cb => { cb.checked = selectAll; });
  }
  updateEventCounter();
}

async function beginSearch() {
  const name = document.getElementById("memberSelect").value;
  const member = memberMap[name] || {};
  const eventsToSearch = searchState.allEvents.filter(e => searchState.selectedEvents.has(`${e.source}:${e.sourceId}`));

  if (!eventsToSearch.length) return;

  searchState.step = "searching";
  searchState.foundResults = [];
  searchState.selectedResults = new Map();

  const sp = document.getElementById("searchPanel");
  sp.innerHTML = `<div class="search-panel"><div class="card">
    <p class="search-section-title">검색 중... <small>0 / ${eventsToSearch.length}</small></p>
    <div class="progress-bar-wrap"><div class="progress-bar-bg"><div class="progress-bar-fill" id="searchProgressBar" style="width:0%"></div></div></div>
    <div class="progress-text" id="searchProgressText">검색 준비 중...</div>
    <div id="searchLiveResults"></div>
  </div></div>`;

  try {
    const res = await fetch(`${RACE_API}?action=search-member-events`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        realName: name,
        nickname: member.nickname || name,
        gender: member.gender || "",
        filterGender: member.gender || "",
        events: eventsToSearch.map(e => ({ source: e.source, sourceId: e.sourceId, eventName: e.eventName || e.sourceId, eventDate: e.eventDate || "" })),
      }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "검색 시작 실패");
    searchState.jobId = data.jobId;
    pollSearchJob();
  } catch (e) {
    sp.innerHTML = `<div class="search-panel"><div class="card">
      <div class="empty"><span class="empty-icon">⚠️</span>검색을 시작하지 못했습니다.<br><small style="color:var(--color-text-muted)">${esc(e.message)}</small></div>
      <div style="text-align:center;margin-top:8px"><button class="btn btn-outline btn-sm" onclick="resetSearch()">닫기</button></div>
    </div></div>`;
  }
}

function pollSearchJob() {
  const startedAt = Date.now();
  const MAX_POLL_MS = 520000; // 8분 40초 (서버 timeout 540초보다 약간 짧게)

  const poll = async () => {
    if (Date.now() - startedAt > MAX_POLL_MS) {
      clearInterval(searchState.pollTimer);
      const sp = document.getElementById("searchPanel");
      sp.innerHTML = `<div class="search-panel"><div class="card">
        <div class="empty"><span class="empty-icon">⏱️</span>검색 시간이 초과되었습니다.<br><small style="color:var(--color-text-muted)">선택한 대회가 너무 많습니다. 검색할 월을 줄여서 다시 시도해주세요.</small></div>
        <div style="text-align:center;margin-top:8px"><button class="btn btn-outline btn-sm" onclick="startSearchFlow()">다시 선택하기</button></div>
      </div></div>`;
      return;
    }
    try {
      const res = await fetch(`${RACE_API}?action=member-search-job&jobId=${searchState.jobId}`);
      const data = await res.json();
      if (!data.ok) return;

      // 서버에서 failed 상태 처리
      if (data.status === "failed") {
        clearInterval(searchState.pollTimer);
        const sp = document.getElementById("searchPanel");
        sp.innerHTML = `<div class="search-panel"><div class="card">
          <div class="empty"><span class="empty-icon">⚠️</span>검색 중 오류가 발생했습니다.<br><small style="color:var(--color-text-muted)">${esc(data.error || "알 수 없는 오류")}</small></div>
          <div style="text-align:center;margin-top:8px"><button class="btn btn-outline btn-sm" onclick="startSearchFlow()">다시 시도하기</button></div>
        </div></div>`;
        return;
      }

      const prog = data.progress || {};
      const pct = prog.total > 0 ? Math.round((prog.searched / prog.total) * 100) : 0;

      const bar = document.getElementById("searchProgressBar");
      const txt = document.getElementById("searchProgressText");
      const title = document.querySelector(".search-section-title small");
      if (bar) bar.style.width = pct + "%";
      if (txt) txt.textContent = prog.currentEvent ? `${esc(prog.currentEvent)} 검색 중...` : "검색 중...";
      if (title) title.textContent = `${prog.searched || 0} / ${prog.total || 0}`;

      searchState.foundResults = data.results || [];
      renderLiveResults();

      if (data.status === "complete") {
        clearInterval(searchState.pollTimer);
        searchState.step = "review";
        renderSearchResults();
      }
    } catch (_) {}
  };

  poll();
  searchState.pollTimer = setInterval(poll, 2000);
}

function renderLiveResults() {
  const el = document.getElementById("searchLiveResults");
  if (!el) return;
  const results = searchState.foundResults;
  if (!results.length) { el.innerHTML = ""; return; }

  el.innerHTML = `<div style="margin-top:12px;font-size:13px;color:var(--color-text-secondary)">
    <strong>${results.length}</strong>개 대회에서 기록 발견
    ${results.map(r => `<div style="padding:4px 0;display:flex;align-items:center;gap:6px">
      <span style="color:var(--color-success)">✓</span>
      <span>${esc(r.eventName)}</span>
      <span style="color:var(--color-text-muted);font-size:12px">${r.records.length}건</span>
    </div>`).join("")}
  </div>`;
}

function renderSearchResults() {
  const sp = document.getElementById("searchPanel");
  const results = searchState.foundResults;

  if (!results.length) {
    sp.innerHTML = `<div class="search-panel"><div class="card">
      <div class="empty"><span class="empty-icon">🏃</span>선택한 대회에서 기록을 찾지 못했습니다.</div>
      <div style="text-align:center;margin-top:8px"><button class="btn btn-outline btn-sm" onclick="resetSearch()">닫기</button></div>
    </div></div>`;
    return;
  }

  const totalRecords = results.reduce((sum, r) => sum + r.records.length, 0);
  const multiEvents = results.filter(r => r.records.length > 1);

  // selectedResults: Map<eventIdx, recordIdx|null>
  // 1건 → 자동 포함, 다건 → 미선택 (사용자가 라디오로 선택)
  if (searchState.step === "review") {
    searchState.selectedResults = new Map();
    for (let i = 0; i < results.length; i++) {
      if (results[i].records.length === 1) {
        searchState.selectedResults.set(i, 0);
      }
    }
    searchState.step = "reviewed";
  }

  const selCount = [...searchState.selectedResults.values()].filter(v => v !== null).length;
  const needsAction = multiEvents.length > 0;
  const unresolved = multiEvents.filter((_, idx) => {
    const realIdx = results.indexOf(multiEvents[idx]);
    return !searchState.selectedResults.has(realIdx);
  }).length;

  sp.innerHTML = `<div class="search-panel"><div class="card">
    <p class="search-section-title">검색 결과 <small>${results.length}개 대회, ${totalRecords}건</small></p>
    <p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 12px">${needsAction ? '<strong style="color:var(--color-error)">동명이인이 포함되어 있습니다. 본인 기록을 선택해주세요.</strong>' : "저장할 기록을 확인하세요."}</p>
    ${results.map((r, i) => {
      const isMulti = r.records.length > 1;
      const chosen = searchState.selectedResults.get(i);
      const included = searchState.selectedResults.has(i) && chosen !== null;

      if (!isMulti) {
        const rec = r.records[0];
        return `<div class="found-result-card ${included ? "selected" : ""}" style="cursor:pointer" onclick="toggleSingleEvent(${i})">
          <div class="found-result-header">
            <span style="font-size:18px;flex-shrink:0">${included ? "✅" : "⬜"}</span>
            <span class="found-event-name">${esc(r.eventName)}</span>
            <span class="found-event-date">${esc(r.eventDate)}</span>
          </div>
          <div class="found-records" style="padding-left:30px">
            <div class="found-record-row">
              ${distBadge(rec.distance || "?")}
              <span class="found-record-time">${esc(rec.netTime || rec.gunTime || "-")}</span>
              ${rec.bib ? `<span style="font-size:12px;color:var(--color-text-muted)">BIB ${esc(rec.bib)}</span>` : ""}
              ${extLinkHtml(r.source, r.sourceId, rec.memberRealName || "")}
            </div>
          </div>
        </div>`;
      }

      return `<div class="found-result-card ${included ? "selected" : ""}" style="border-color:${chosen === undefined ? "var(--color-error)" : ""}">
        <div class="found-result-header">
          <span class="found-event-name">${esc(r.eventName)}</span>
          <span class="found-event-date">${esc(r.eventDate)}</span>
          <span style="font-size:11px;padding:2px 6px;border-radius:4px;background:var(--color-error-light);color:var(--color-error);font-weight:600">동명이인 ${r.records.length}건</span>
        </div>
        <div class="found-records" style="padding-left:4px">
          ${r.records.map((rec, j) => {
            const isSel = chosen === j;
            return `<label class="found-record-row" style="cursor:pointer;padding:8px 6px;border-radius:8px;${isSel ? "background:#EFF6FF;" : ""}">
              <input type="radio" name="evt_${i}" ${isSel ? "checked" : ""} onchange="pickRecord(${i}, ${j})" style="width:16px;height:16px;accent-color:var(--color-primary);flex-shrink:0" />
              ${distBadge(rec.distance || "?")}
              <span class="found-record-time">${esc(rec.netTime || rec.gunTime || "-")}</span>
              ${rec.bib ? `<span style="font-size:12px;color:var(--color-text-muted)">BIB ${esc(rec.bib)}</span>` : ""}
              ${extLinkHtml(r.source, r.sourceId, rec.memberRealName || "")}
            </label>`;
          }).join("")}
          <label class="found-record-row" style="cursor:pointer;padding:8px 6px;border-radius:8px;${chosen === null ? "background:#FEF2F2;" : ""}">
            <input type="radio" name="evt_${i}" ${chosen === null ? "checked" : ""} onchange="pickRecord(${i}, null)" style="width:16px;height:16px;accent-color:var(--color-text-muted);flex-shrink:0" />
            <span style="font-size:13px;color:var(--color-text-muted)">해당 없음 (건너뛰기)</span>
          </label>
        </div>
      </div>`;
    }).join("")}
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
      <button class="btn btn-outline btn-sm" onclick="resetSearch()">취소</button>
      <button class="btn btn-success btn-sm" ${selCount === 0 ? "disabled" : ""} onclick="saveSearchResults()">선택한 ${selCount}건 저장</button>
    </div>
  </div></div>`;
}

function toggleSingleEvent(evtIdx) {
  if (searchState.selectedResults.has(evtIdx)) {
    searchState.selectedResults.delete(evtIdx);
  } else {
    searchState.selectedResults.set(evtIdx, 0);
  }
  renderSearchResults();
}

function pickRecord(evtIdx, recIdx) {
  searchState.selectedResults.set(evtIdx, recIdx);
  renderSearchResults();
}

async function saveSearchResults() {
  const name = document.getElementById("memberSelect").value;
  const member = memberMap[name] || {};
  const results = searchState.foundResults;

  const entries = [...searchState.selectedResults.entries()].filter(([_, v]) => v !== null);
  if (!entries.length) return;

  const confirmMsg = `${entries.length}건의 기록을 저장할까요?`;
  if (!confirm(confirmMsg)) return;

  let savedTotal = 0;
  let errors = [];

  for (const [i, j] of entries) {
    const r = results[i];
    const selectedRecords = [r.records[j]];
    try {
      const saveRes = await fetch(`${RACE_API}?action=confirm`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          jobId: `search_${searchState.jobId}_${i}`,
          eventName: r.eventName,
          eventDate: r.eventDate,
          source: r.source,
          sourceId: r.sourceId,
          confirmSource: "personal",
          results: selectedRecords.map(rec => ({
            memberRealName: rec.memberRealName || name,
            memberNickname: rec.memberNickname || member.nickname || name,
            distance: rec.distance || "",
            netTime: rec.netTime || "",
            gunTime: rec.gunTime || "",
            bib: rec.bib || "",
            gender: rec.memberGender || member.gender || "",
            pbConfirmed: false,
            isGuest: false,
            note: "",
          })),
        }),
      });
      const data = await saveRes.json();
      if (data.ok) savedTotal += data.savedCount || 0;
      else errors.push(`${r.eventName}: ${data.error}`);
    } catch (e) {
      errors.push(`${r.eventName}: ${e.message}`);
    }
  }

  if (errors.length) {
    showToast(`${savedTotal}건 저장 완료, ${errors.length}건 실패`, 4000);
  } else {
    showToast(`${savedTotal}건 저장 완료`);
  }

  resetSearch();

  // Reload data
  try {
    const racesRes = await fetch(`${RACE_API}?action=confirmed-races`);
    const racesJson = await racesRes.json();
    if (racesJson.ok) {
      racesData = racesJson.races || [];
      updateStats();
      renderMemberDetail();
    }
  } catch (_) {}
}

function toggleRace(id) {
  const el = document.getElementById(`race-${id}`);
  if (el) el.classList.toggle("open");
}

function emptyState(msg) {
  return `<div class="card"><div class="empty"><span class="empty-icon">🏃</span>${esc(msg)}</div></div>`;
}

function updateStats() {
  const all = enrichResults();
  const memberNames = new Set(all.map(r => r.realName));
  document.getElementById("statMembers").textContent = memberNames.size;
  document.getElementById("statRaces").textContent = racesData.length;
  document.getElementById("statRecords").textContent = all.length;
}

function render() {
  if (currentTab === "pb") renderPBTab();
  else if (currentTab === "races") renderRacesTab();
  else if (currentTab === "individual") renderIndividualTab();
}

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentTab = tab.dataset.tab;
    render();
  });
});

document.querySelectorAll(".filter-pill").forEach(pill => {
  pill.addEventListener("click", () => {
    document.querySelectorAll(".filter-pill").forEach(p => p.classList.remove("active"));
    pill.classList.add("active");
    currentDist = pill.dataset.dist;
    render();
  });
});

document.querySelectorAll(".sub-filter").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".sub-filter").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentGender = btn.dataset.gender;
    render();
  });
});

const RACE_API = location.hostname === "localhost"
  ? "http://127.0.0.1:5001/dmc-attendance/asia-northeast3/race"
  : "https://race-nszximpvtq-du.a.run.app";

async function init() {
  const contentEl = document.getElementById("content");
  contentEl.innerHTML = `<div class="card">${Array(5).fill('<div class="skeleton skeleton-line" style="width:' + (60 + Math.random()*30) + '%"></div>').join("")}</div>`;

  try {
    const [membersRes, racesRes] = await Promise.all([
      fetch(`${RACE_API}?action=members`),
      fetch(`${RACE_API}?action=confirmed-races`),
    ]);
    const membersJson = await membersRes.json();
    const racesJson = await racesRes.json();
    if (!membersJson.ok) throw new Error("회원 정보를 불러오지 못했습니다");
    if (!racesJson.ok) throw new Error("대회 기록을 불러오지 못했습니다");
    membersData = (membersJson.members || []).map(m => ({
      realName: m.realName,
      nickname: m.nickname,
      gender: m.gender || "",
      team: m.team || "",
    }));
    racesData = racesJson.races || [];
    memberMap = {};
    for (const m of membersData) memberMap[m.realName] = m;
    updateStats();
    const hashTab = location.hash.replace("#", "");
    if (["pb", "races", "individual"].includes(hashTab)) {
      currentTab = hashTab;
      document.querySelectorAll(".tab").forEach(t => {
        t.classList.toggle("active", t.dataset.tab === currentTab);
      });
    }
    render();
  } catch (e) {
    contentEl.innerHTML = `<div class="card"><div class="empty"><span class="empty-icon">⚠️</span>데이터를 불러오지 못했습니다.<br><small style="color:var(--color-text-muted)">${esc(e.message)}</small></div></div>`;
  }
}

init();

function showFeedback() {
  const msg = prompt("불편한 점이나 건의사항을 알려주세요:");
  if (msg && msg.trim()) {
    fetch(`${RACE_API}?action=log`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ event: "feedback", data: { message: msg.trim(), page: "races" } }),
    }).catch(() => {});
    alert("소중한 의견 감사합니다! 🙏");
  }
}
